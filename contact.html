<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS VIP | JOIN US</title>
    
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Playfair+Display:ital,wght@1,700&swap" rel="stylesheet">

    <style>
        :root {
            --accent: #ff0055;
            --gold: #d4af37;
            --bg: #050505;
            --surface: #0a0a0c;
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; scroll-behavior: smooth; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }

        nav { 
            position: fixed; top: 0; width: 100%; padding: 15px 6%; display: flex; 
            justify-content: space-between; align-items: center; z-index: 1000; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            backdrop-filter: blur(10px);
        }
        .logo { font-size: 1.5rem; font-weight: 900; letter-spacing: 3px; color: var(--accent); text-decoration: none; text-shadow: 0 0 10px var(--accent); }
        .logo span { color: white; font-style: italic; }
        .nav-links a { color: #eee; text-decoration: none; margin-left: 20px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; transition: 0.3s; }
        .nav-links a:hover { color: var(--accent); }

        .vip-btn {
            padding: 15px 50px; background: transparent; color: white; border: 2px solid var(--accent);
            border-radius: 0; font-weight: 800; text-transform: uppercase; letter-spacing: 3px;
            cursor: pointer; transition: 0.5s; box-shadow: inset 0 0 0 0 var(--accent);
        }
        .vip-btn:hover { box-shadow: inset 0 0 50px 0 var(--accent); border-color: white; }

        .section-title { font-size: 2.5rem; font-weight: 900; margin-bottom: 40px; text-transform: uppercase; text-align: center; letter-spacing: 2px; }
        .section-title span { color: var(--accent); }

        /* Full Screen Contact Section */
        #contact-page { 
            min-height: 100vh; display: flex; align-items: center; justify-content: center; 
            padding: 100px 6% 50px; background: radial-gradient(circle at center, rgba(255, 0, 85, 0.05) 0%, transparent 60%);
        }
        .contact-wrap { width: 100%; max-width: 800px; background: #080808; padding: 60px; border-top: 4px solid var(--accent); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input, textarea { width: 100%; padding: 18px; margin-bottom: 15px; background: #111; border: 1px solid #222; color: white; outline: none; font-size: 1rem; }
        input:focus, textarea:focus { border-color: var(--accent); }
        
        footer { padding: 60px 6%; background: #050505; border-top: 1px solid #111; text-align: center; }
        .footer-logo { font-family: 'Syncopate', sans-serif; font-size: 1.5rem; margin-bottom: 20px; display: block; color: #fff; text-decoration: none; }
        .footer-socials { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; }
        .footer-socials a { font-size: 1.5rem; color: #444; transition: 0.3s; }
        .footer-socials a:hover { color: var(--accent); }
        .footer-copy { font-size: 0.7rem; color: #333; letter-spacing: 2px; }

        @media (max-width: 768px) { .nav-links { display: none; } .contact-wrap { padding: 30px; } }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">NEXUS<span>VIP</span></a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="index.html#actresses">Models</a>
            <a href="index.html#videos">VIP Clips</a>
            <a href="index.html#photos">Galleries</a>
        </div>
    </nav>

    <section id="contact-page">
        <div class="contact-wrap">
            <h2 class="section-title" style="margin-bottom: 10px;">BECOME A <span>CONTRIBUTOR</span></h2>
            <p style="text-align: center; color: #555; margin-bottom: 40px;">Upload your exclusive content and join the elite circle.</p>
            <input type="text" placeholder="DISPLAY NAME">
            <input type="email" placeholder="EMAIL ADDRESS">
            <textarea rows="5" placeholder="PASTE LINKS (MEGA, DRIVE, ETC.)"></textarea>
            <button class="vip-btn" style="width: 100%;">SUBMIT ARCHIVE</button>
        </div>
    </section>
    <footer>
        <a href="#" class="footer-logo">NEXUS<span>VIP</span></a>
        <div class="footer-socials">
            <a href="#"><i class="ri-instagram-line"></i></a>
            <a href="#"><i class="ri-twitter-x-line"></i></a>
            <a href="#"><i class="ri-telegram-line"></i></a>
        </div>
        <p class="footer-copy">© 2026 NEXUS VIP ENTERTAINMENT. ALL RIGHTS RESERVED.</p>
    </footer>

</body>
</html>
