<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STAR STREAM | CONTACT US</title>
    
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #ff0055;
            --gold: #d4af37;
            --bg: #050505;
            --surface: #0a0a0c;
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; scroll-behavior: smooth; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }

        nav { 
            position: fixed; top: 0; width: 100%; padding: 20px 6%; display: flex; 
            justify-content: space-between; align-items: center; z-index: 1000; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            backdrop-filter: blur(10px);
        }
        .logo { font-family: 'Syncopate', sans-serif; font-size: 1.4rem; font-weight: 700; color: var(--text); text-decoration: none; }
        .logo span { color: var(--accent); }
        
        .nav-links a { color: #888; text-decoration: none; margin-left: 25px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .nav-links a:hover { color: var(--accent); }

        .vip-btn {
            padding: 15px 50px; background: transparent; color: white; border: 2px solid var(--accent);
            border-radius: 50px; font-weight: 800; text-transform: uppercase; letter-spacing: 3px;
            cursor: pointer; transition: 0.5s; box-shadow: inset 0 0 0 0 var(--accent);
            font-size: 0.75rem;
        }
        .vip-btn:hover { box-shadow: inset 0 0 50px 0 var(--accent); border-color: white; transform: translateY(-3px); }

        .section-title { font-family: 'Syncopate', sans-serif; font-size: 2rem; margin-bottom: 40px; text-transform: uppercase; text-align: center; letter-spacing: 2px; }
        .section-title span { color: var(--accent); }

        /* Full Screen Contact Section */
        #contact-page { 
            min-height: 100vh; display: flex; align-items: center; justify-content: center; 
            padding: 120px 6% 60px; background: radial-gradient(circle at center, rgba(255, 0, 85, 0.05) 0%, transparent 60%);
        }
        .contact-wrap { width: 100%; max-width: 800px; background: #080808; padding: 60px; border-top: 4px solid var(--accent); border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        input, textarea { 
            width: 100%; padding: 18px; margin-bottom: 20px; background: #111; 
            border: 1px solid #222; color: white; outline: none; font-size: 0.9rem;
            border-radius: 10px; transition: 0.3s;
        }
        input:focus, textarea:focus { border-color: var(--accent); background: #151515; }
        
        footer { padding: 60px 6%; background: #030303; border-top: 1px solid rgba(255,0,85,0.1); text-align: center; }
        .footer-logo { font-family: 'Syncopate', sans-serif; font-size: 1.4rem; margin-bottom: 25px; display: block; color: #fff; text-decoration: none; }
        .footer-logo span { color: var(--accent); }
        
        .footer-socials { display: flex; justify-content: center; gap: 25px; margin-bottom: 30px; }
        .footer-socials a { font-size: 1.5rem; color: #444; transition: 0.3s; }
        .footer-socials a:hover { color: var(--accent); transform: translateY(-5px); }
        .footer-copy { font-size: 0.65rem; color: #333; letter-spacing: 2px; text-transform: uppercase; }

        @media (max-width: 768px) { 
            .nav-links { display: none; } 
            .contact-wrap { padding: 35px 25px; } 
            .section-title { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">STAR<span>STREAM</span></a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="index.html#actresses">Talents</a>
            <a href="index.html#videos">Clips</a>
            <a href="index.html#photos">Galleries</a>
        </div>
    </nav>

    <section id="contact-page">
        <div class="contact-wrap">
            <h2 class="section-title" style="margin-bottom: 10px;">JOIN THE <span>COMMUNITY</span></h2>
            <p style="text-align: center; color: #666; margin-bottom: 45px; font-size: 0.85rem; letter-spacing: 1px;">Share your creative findings and connect with our fan network.</p>
            
            <form action="#">
                <input type="text" placeholder="YOUR DISPLAY NAME" required>
                <input type="email" placeholder="EMAIL ADDRESS" required>
                <textarea rows="5" placeholder="MESSAGE OR CONTENT LINKS (MEGA, DRIVE, ETC.)" required></textarea>
                <button type="submit" class="vip-btn" style="width: 100%;">SEND MESSAGE</button>
            </form>
        </div>
    </section>

    <footer>
        <a href="#" class="footer-logo">STAR<span>STREAM</span></a>
        <div class="footer-socials">
            <a href="#"><i class="ri-instagram-line"></i></a>
            <a href="#"><i class="ri-twitter-x-line"></i></a>
            <a href="#"><i class="ri-telegram-line"></i></a>
            <a href="#"><i class="ri-discord-line"></i></a>
        </div>
        <p class="footer-copy">© 2026 STAR STREAM ARCHIVE. FOR ENTERTAINMENT PURPOSES ONLY.</p>
    </footer>

</body>
</html>
