<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS VIP | PREMIUM ARCHIVE</title>
    
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Montserrat:wght@300;600;900&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <style>
        :root { --accent: #ff0055; --gold: #d4af37; --bg: #030303; --surface: #0a0a0c; --text: #ffffff; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* --- LOADING SCREEN --- */
        #loader {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .loader-logo { font-family: 'Syncopate', sans-serif; font-size: 2rem; letter-spacing: 10px; color: var(--accent); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; text-shadow: 0 0 20px var(--accent); } 50% { opacity: 0.3; } }

        /* --- NAVIGATION & MOBILE MENU --- */
        nav { 
            position: fixed; width: 100%; padding: 20px 6%; display: flex; 
            justify-content: space-between; align-items: center; z-index: 1000; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            backdrop-filter: blur(10px);
        }
        .logo { font-family: 'Syncopate', sans-serif; font-size: 1.4rem; font-weight: 700; color: var(--text); text-decoration: none; }
        .logo span { color: var(--accent); }
        
        .nav-links { display: flex; gap: 30px; }
        .nav-links a { color: #888; text-decoration: none; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .nav-links a:hover { color: var(--accent); }

        .menu-toggle { display: none; font-size: 1.8rem; color: var(--text); cursor: pointer; }

        #mobile-menu {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000;
            display: none; flex-direction: column; justify-content: center; align-items: center; gap: 30px;
        }
        #mobile-menu a { font-size: 1.5rem; color: #fff; text-decoration: none; font-family: 'Syncopate', sans-serif; }
        .close-menu { position: absolute; top: 30px; right: 40px; font-size: 2.5rem; }

        /* --- HERO SECTION --- */
        #home { 
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=2070&auto=format&fit=crop') center/cover;
            position: relative;
        }
        #home h1 { font-family: 'Syncopate', sans-serif; font-size: clamp(2.5rem, 10vw, 6rem); text-transform: uppercase; line-height: 1; margin-bottom: 20px; }
        #home h1 span { color: var(--accent); -webkit-text-stroke: 1px var(--accent); -webkit-text-fill-color: transparent; }
        #home p { font-size: 0.9rem; letter-spacing: 8px; color: var(--gold); margin-bottom: 40px; }

        .vip-btn { 
            padding: 18px 45px; background: var(--accent); color: white; border: none; 
            font-weight: 900; letter-spacing: 3px; cursor: pointer; border-radius: 50px;
            box-shadow: 0 0 30px rgba(255, 0, 85, 0.4); transition: 0.4s;
        }
        .vip-btn:hover { transform: scale(1.05); box-shadow: 0 0 50px rgba(255, 0, 85, 0.6); }

        /* --- GRID & CARDS --- */
        section { padding: 100px 6%; }
        .section-title { font-family: 'Syncopate', sans-serif; font-size: 2rem; margin-bottom: 50px; text-align: center; }
        .section-title span { color: var(--accent); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        
        /* Smaller Actresses Cards (2 Rows Limit) */
        #actress-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
        
        .card { 
            background: var(--surface); position: relative; border-radius: 15px; overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.05); transition: 0.5s; opacity: 0; transform: translateY(30px);
        }
        .card:hover { border-color: var(--accent); transform: translateY(-10px); }
        .card-img-wrap { height: 350px; overflow: hidden; }
        #actress-grid .card-img-wrap { height: 280px; }
        .card img { width: 100%; height: 100%; object-fit: cover; transition: 0.8s; }
        .card:hover img { transform: scale(1.1); }

        .video-container { position: relative; width: 100%; padding-top: 177%; background: #000; }
        .video-container iframe, video { position: absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; }

        .card-info { 
            position: absolute; bottom: 0; width: 100%; padding: 20px; 
            background: linear-gradient(to top, #000 40%, transparent); text-align: center; 
        }
        .card-info h3 { font-size: 0.9rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 15px; }

        .btn-row { display: flex; gap: 10px; }
        .btn-sm { flex: 1; padding: 10px; background: rgba(255,0,85,0.1); color: var(--accent); border: 1px solid var(--accent); border-radius: 5px; cursor: pointer; font-size: 0.6rem; font-weight: 800; transition: 0.3s; }
        .btn-sm:hover { background: var(--accent); color: white; }

        /* --- CONTROLS --- */
        .controls { display: flex; justify-content: center; gap: 15px; margin-top: 50px; }
        .control-btn { background: transparent; border: 1px solid #333; color: #fff; padding: 12px 35px; border-radius: 50px; cursor: pointer; font-size: 0.7rem; font-weight: 700; letter-spacing: 2px; }
        .control-btn:hover { border-color: var(--accent); color: var(--accent); }

        /* --- FOOTER --- */
        footer { padding: 60px 6%; background: #050505; border-top: 1px solid #111; text-align: center; }
        .footer-logo { font-family: 'Syncopate', sans-serif; font-size: 1.5rem; margin-bottom: 20px; display: block; color: #fff; text-decoration: none; }
        .footer-socials { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; }
        .footer-socials a { font-size: 1.5rem; color: #444; transition: 0.3s; }
        .footer-socials a:hover { color: var(--accent); }
        .footer-copy { font-size: 0.7rem; color: #333; letter-spacing: 2px; }

        /* --- MOBILE SLIDER --- */
        @media (max-width: 768px) {
            .nav-links { display: none; }
            .menu-toggle { display: block; }
            #video-grid { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; gap: 15px; scrollbar-width: none; }
            #video-grid .card { min-width: 85%; scroll-snap-align: center; flex-shrink: 0; opacity: 1; transform: none; }
            .mobile-slider-controls { display: flex !important; position: absolute; width: 100%; top: 50%; justify-content: space-between; z-index: 10; pointer-events: none; }
            .slider-arrow { pointer-events: auto; background: var(--accent); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; margin: 0 5px; }
        }

        .mobile-slider-controls { display: none; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-logo">NEXUS</div>
    </div>

    <div id="mobile-menu">
        <i class="ri-close-line close-menu" onclick="toggleMenu(false)"></i>
        <a href="#home" onclick="toggleMenu(false)">HOME</a>
        <a href="#actresses" onclick="toggleMenu(false)">MODELS</a>
        <a href="#videos" onclick="toggleMenu(false)">VIP CLIPS</a>
        <a href="#photos" onclick="toggleMenu(false)">GALLERY</a>
        <a href="contact.html">JOIN US</a>
    </div>

    <nav>
        <a href="#home" class="logo">NEXUS<span>VIP</span></a>
        <div class="nav-links">
            <a href="#home">Home</a>
            <a href="#actresses">Models</a>
            <a href="#videos">VIP Clips</a>
            <a href="#photos">Galleries</a>
            <a href="contact.html">Join Us</a>
        </div>
        <i class="ri-menu-4-line menu-toggle" onclick="toggleMenu(true)"></i>
    </nav>

    <section id="home">
        <p><i class="ri-shield-flash-line"></i> PRIVATE ARCHIVE</p>
        <h1>Pure <span>Desire.</span></h1>
        <button class="vip-btn" onclick="document.getElementById('actresses').scrollIntoView()">UNLEASH NOW</button>
    </section>

    <section id="actresses">
        <h2 class="section-title">TOP <span>MODELS</span></h2>
        <div id="actress-grid" class="grid"></div>
        <div class="controls">
            <button class="control-btn" id="a-more" onclick="loadMoreActresses()">See More</button>
            <button class="control-btn" id="a-hide" onclick="hideActresses()" style="display:none;">Hide</button>
        </div>
    </section>

    <section id="videos" style="background: #000; position: relative;">
        <h2 class="section-title">VIP <span>CLIPS</span></h2>
        <div class="mobile-slider-controls">
            <button class="slider-arrow" onclick="scrollSlider('left')"><i class="ri-arrow-left-s-line"></i></button>
            <button class="slider-arrow" onclick="scrollSlider('right')"><i class="ri-arrow-right-s-line"></i></button>
        </div>
        <div id="video-grid" class="grid"></div>
        <div class="controls" id="video-controls-desktop">
            <button class="control-btn" id="v-more" onclick="loadMoreVideos()">See More</button>
            <button class="control-btn" id="v-hide" onclick="hideVideos()" style="display:none;">Hide</button>
        </div>
    </section>

    <section id="photos">
        <h2 class="section-title">EXCLUSIVE <span>GALLERY</span></h2>
        <div id="photo-grid" class="grid"></div>
        <div class="controls">
            <button class="control-btn" id="p-more" onclick="loadMorePhotos()">See More</button>
            <button class="control-btn" id="p-hide" onclick="hidePhotos()" style="display:none;">Hide</button>
        </div>
    </section>

    <footer>
        <a href="#" class="footer-logo">NEXUS<span>VIP</span></a>
        <div class="footer-socials">
            <a href="#"><i class="ri-instagram-line"></i></a>
            <a href="#"><i class="ri-twitter-x-line"></i></a>
            <a href="#"><i class="ri-telegram-line"></i></a>
        </div>
        <p class="footer-copy">© 2026 NEXUS VIP ENTERTAINMENT. ALL RIGHTS RESERVED.</p>
    </footer>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTr0Iyy40tk0ruBQhi1yYtf4-mh26HPt3eZAZzVqhj62Hk_DH01r41cwvkEY40TWmnC1ZwKjFd03gJa/pub?gid=1227904236&single=true&output=csv'; 

        let allData = [], shuffledVideos = [], shuffledPhotos = [], names = [];
        let aIndex = 8, vIndex = 3, pIndex = 3;

        // --- LOADER ---
        window.addEventListener('load', () => {
            gsap.to("#loader", { opacity: 0, duration: 1, delay: 1, onComplete: () => document.getElementById("loader").style.display = "none" });
        });

        // --- MOBILE MENU ---
        function toggleMenu(show) {
            const menu = document.getElementById("mobile-menu");
            menu.style.display = show ? "flex" : "none";
        }

        async function fetchData() {
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                const rows = text.split('\n').slice(1);
                let lastN = "", lastP = "";
                
                allData = rows.map(r => {
                    const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    let n = c[0]?.replace(/"/g, '').trim();
                    let p = c[1]?.replace(/"/g, '').trim();
                    if (!n && lastN) n = lastN; else lastN = n;
                    if (!p && lastP) p = lastP; else lastP = p;
                    return { name: n, profile: p, type: c[2]?.trim().toLowerCase(), link: c[3]?.trim() };
                }).filter(i => i.name && i.link);

                names = [...new Set(allData.map(i => i.name))];
                shuffledVideos = allData.filter(i => i.type === 'video').sort(() => Math.random() - 0.5);
                shuffledPhotos = allData.filter(i => i.type === 'photo').sort(() => Math.random() - 0.5);

                renderAll();
                initAnimations();
            } catch (e) { console.error(e); }
        }

        function renderAll() {
            const aGrid = document.getElementById('actress-grid');
            const vGrid = document.getElementById('video-grid');
            const pGrid = document.getElementById('photo-grid');

            // Actresses (2 Rows Initial)
            aGrid.innerHTML = names.slice(0, aIndex).map(name => {
                const m = allData.find(i => i.name === name);
                return `<div class="card"><div class="card-img-wrap"><img src="${m.profile}"></div><div class="card-info"><h3>${name}</h3><div class="btn-row"><button class="btn-sm">VIDEO</button><button class="btn-sm">PHOTOS</button></div></div></div>`;
            }).join('');

            // Videos
            if (window.innerWidth <= 768) {
                vGrid.innerHTML = shuffledVideos.map(i => createMediaItem(i)).join('');
            } else {
                vGrid.innerHTML = shuffledVideos.slice(0, vIndex).map(i => createMediaItem(i)).join('');
            }

            // Photos
            pGrid.innerHTML = shuffledPhotos.slice(0, pIndex).map(i => createMediaItem(i)).join('');
        }

        // --- LOAD MORE LOGIC ---
        function loadMoreActresses() {
            aIndex += 8;
            renderAll();
            if (aIndex >= names.length) document.getElementById('a-more').style.display = 'none';
            document.getElementById('a-hide').style.display = 'block';
            initAnimations();
        }
        function hideActresses() { aIndex = 8; renderAll(); document.getElementById('a-more').style.display = 'block'; document.getElementById('a-hide').style.display = 'none'; }

        function loadMoreVideos() {
            vIndex += 3;
            renderAll();
            if (vIndex >= shuffledVideos.length) document.getElementById('v-more').style.display = 'none';
            document.getElementById('v-hide').style.display = 'block';
            initAnimations();
        }
        function hideVideos() { vIndex = 3; renderAll(); document.getElementById('v-more').style.display = 'block'; document.getElementById('v-hide').style.display = 'none'; }

        function loadMorePhotos() {
            pIndex += 3;
            renderAll();
            if (pIndex >= shuffledPhotos.length) document.getElementById('p-more').style.display = 'none';
            document.getElementById('p-hide').style.display = 'block';
            initAnimations();
        }
        function hidePhotos() { pIndex = 3; renderAll(); document.getElementById('p-more').style.display = 'block'; document.getElementById('p-hide').style.display = 'none'; }

        function createMediaItem(i) {
            if (i.type === 'video') return `<div class="card"><div class="video-container">${getVideoElement(i.link)}</div></div>`;
            return `<div class="card" style="height:auto;"><img src="${i.link}" style="width:100%; height:auto;"></div>`;
        }

        function getVideoElement(u) {
            if (u.includes('youtube.com')) u = u.replace('watch?v=', 'embed/');
            if (u.includes('drive.google.com')) u = u.replace('/view', '/preview');
            return `<iframe src="${u}" allowfullscreen></iframe>`;
        }

        function scrollSlider(dir) {
            const g = document.getElementById('video-grid');
            g.scrollBy({ left: dir === 'right' ? 300 : -300, behavior: 'smooth' });
        }

        // --- GSAP ANIMATIONS ---
        function initAnimations() {
            gsap.registerPlugin(ScrollTrigger);
            gsap.utils.toArray(".card").forEach(card => {
                gsap.to(card, {
                    scrollTrigger: { trigger: card, start: "top 90%" },
                    opacity: 1, y: 0, duration: 1, ease: "power2.out"
                });
            });
        }

        fetchData();
    </script>
</body>
</html>
