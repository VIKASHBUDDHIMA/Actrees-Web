<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS VIP | EXCLUSIVE ARCHIVE</title>
    
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Playfair+Display:ital,wght@1,700&swap" rel="stylesheet">

    <style>
        :root {
            --accent: #ff0055;
            --gold: #d4af37;
            --bg: #050505;
            --surface: #0a0a0c;
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; scroll-behavior: smooth; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }

        nav { 
            position: fixed; width: 100%; padding: 15px 6%; display: flex; 
            justify-content: space-between; align-items: center; z-index: 1000; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            backdrop-filter: blur(10px);
        }
        .logo { font-size: 1.5rem; font-weight: 900; letter-spacing: 3px; color: var(--accent); text-decoration: none; text-shadow: 0 0 10px var(--accent); }
        .logo span { color: white; font-style: italic; }
        .nav-links a { color: #eee; text-decoration: none; margin-left: 20px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; transition: 0.3s; }
        .nav-links a:hover { color: var(--accent); }

        #home { 
            height: 100vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; text-align: center;
            background: radial-gradient(circle at 70% 30%, rgba(255, 0, 85, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 20% 70%, rgba(212, 175, 55, 0.1) 0%, transparent 40%);
            position: relative;
        }
        #home::after { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.3); z-index: 1; }
        
        .hero-content { z-index: 10; }
        #home h1 { font-family: 'Playfair Display', serif; font-size: clamp(3rem, 12vw, 8rem); font-style: italic; line-height: 1; margin-bottom: 10px; }
        #home h1 span { color: var(--accent); }
        #home p { font-size: 1.2rem; letter-spacing: 5px; text-transform: uppercase; color: var(--gold); margin-bottom: 40px; font-weight: 300; }

        .vip-btn {
            padding: 15px 50px; background: transparent; color: white; border: 2px solid var(--accent);
            border-radius: 0; font-weight: 800; text-transform: uppercase; letter-spacing: 3px;
            cursor: pointer; transition: 0.5s; box-shadow: inset 0 0 0 0 var(--accent);
        }
        .vip-btn:hover { box-shadow: inset 0 0 50px 0 var(--accent); border-color: white; }

        section { padding: 80px 6%; }
        .section-title { font-size: 2.5rem; font-weight: 900; margin-bottom: 40px; text-transform: uppercase; text-align: center; letter-spacing: 2px; }
        .section-title span { color: var(--accent); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }

        .card { 
            background: var(--surface); position: relative; overflow: hidden; 
            border: 1px solid #1a1a1a; transition: 0.4s ease-in-out;
        }
        .card:hover { border-color: var(--accent); z-index: 10; }
        
        .card-img-wrap { width: 100%; height: 450px; position: relative; }
        .card img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.8); transition: 0.5s; }
        .card:hover img { filter: brightness(1.1); }

        .video-container {
            position: relative;
            width: 100%;
            padding-top: 177.77%; /* 9:16 Ratio */
            background: #000;
        }
        .video-container iframe, .video-container video {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: none; object-fit: cover;
        }

        .card-info { 
            position: absolute; bottom: 0; width: 100%; padding: 25px;
            background: linear-gradient(to top, rgba(0,0,0,1) 30%, transparent);
            text-align: center;
        }
        .card-info h3 { font-size: 1.5rem; letter-spacing: 1px; margin-bottom: 15px; }
        
        .btn-row { display: flex; gap: 5px; }
        .btn-sm { flex: 1; padding: 12px; background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; text-transform: uppercase; font-size: 0.7rem; font-weight: 700; transition: 0.3s; }
        .btn-sm:hover { background: var(--accent); border-color: var(--accent); }

        #detail-view { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: none; overflow-y: auto; padding: 100px 6%; }
        .close-btn { position: fixed; top: 30px; right: 40px; font-size: 3rem; color: var(--accent); cursor: pointer; }

        .contact-wrap { max-width: 800px; margin: 0 auto; background: #080808; padding: 60px; border-top: 4px solid var(--accent); }
        input, textarea { width: 100%; padding: 18px; margin-bottom: 15px; background: #111; border: 1px solid #222; color: white; outline: none; font-size: 1rem; }
        
        #status { text-align: center; font-style: italic; color: var(--gold); margin-bottom: 20px; }

        @media (max-width: 768px) { .nav-links { display: none; } #home h1 { font-size: 4rem; } }
    </style>
</head>
<body>

    <nav>
        <a href="#home" class="logo">NEXUS<span>VIP</span></a>
        <div class="nav-links">
            <a href="#home">Home</a>
            <a href="#actresses">Models</a>
            <a href="#videos">VIP Clips</a>
            <a href="#photos">Galleries</a>
            <a href="#contact">Join Us</a>
        </div>
    </nav>

    <div id="detail-view">
        <span class="close-btn" onclick="closeOverlay()">&times;</span>
        <h2 id="overlay-title" class="section-title">EXCLUSIVE <span>CONTENT</span></h2>
        <div class="grid" id="overlay-grid"></div>
    </div>

    <section id="home">
        <div class="hero-content">
            <p>PREMIUM ACCESS ONLY</p>
            <h1>Pure <span>Desire.</span></h1>
            <button class="vip-btn" onclick="location.href='#actresses'">ENTER THE ARCHIVE</button>
        </div>
    </section>

    <section id="actresses">
        <h2 class="section-title">TOP <span>MODELS</span></h2>
        <div id="status">Loading Private Database...</div>
        <div class="grid" id="actress-grid"></div>
    </section>

    <section id="videos" style="background: #070707;">
        <h2 class="section-title">VIP <span>CLIPS</span></h2>
        <div class="grid" id="video-grid"></div>
    </section>

    <section id="photos">
        <h2 class="section-title">EXCLUSIVE <span>SHOTS</span></h2>
        <div class="grid" id="photo-grid"></div>
    </section>

    <section id="contact">
        <div class="contact-wrap">
            <h2 class="section-title" style="margin-bottom: 10px;">BECOME A <span>CONTRIBUTOR</span></h2>
            <p style="text-align: center; color: #555; margin-bottom: 40px;">Upload your exclusive content and join the elite circle.</p>
            <input type="text" placeholder="DISPLAY NAME">
            <input type="email" placeholder="EMAIL ADDRESS">
            <textarea rows="5" placeholder="PASTE LINKS (MEGA, DRIVE, ETC.)"></textarea>
            <button class="vip-btn" style="width: 100%;">SUBMIT ARCHIVE</button>
        </div>
    </section>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSlC5rHr5IXgKcaBRry2zxfrhpBjmLKjBhLqMzhKwY8UNUtD17nHK96afzVk3cFeCQDzRXOtmHOzwAw/pub?gid=1177191944&single=true&output=csv'; 

        let allData = [];

        function getVideoElement(url) {
            let finalUrl = url.trim();
            if (finalUrl.includes('youtube.com/watch?v=')) {
                finalUrl = finalUrl.replace('watch?v=', 'embed/');
                return `<iframe src="${finalUrl}" allowfullscreen></iframe>`;
            } else if (finalUrl.includes('youtu.be/')) {
                finalUrl = finalUrl.replace('youtu.be/', 'youtube.com/embed/');
                return `<iframe src="${finalUrl}" allowfullscreen></iframe>`;
            } 
            if (finalUrl.includes('drive.google.com') && finalUrl.includes('/view')) {
                finalUrl = finalUrl.replace('/view', '/preview');
                return `<iframe src="${finalUrl}" allowfullscreen></iframe>`;
            }
            if (finalUrl.toLowerCase().endsWith('.mp4') || finalUrl.toLowerCase().endsWith('.webm')) {
                return `<video controls playsinline><source src="${finalUrl}" type="video/mp4"></video>`;
            }
            return `<iframe src="${finalUrl}" allowfullscreen></iframe>`;
        }

        async function fetchData() {
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                const rows = text.split('\n').slice(1);
                
                let lastKnownName = "";
                let lastKnownProfile = "";

                allData = rows.map(r => {
                    const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    
                    // Auto-fill logic
                    let name = c[0]?.replace(/"/g, '').trim();
                    let profile = c[1]?.replace(/"/g, '').trim();
                    
                    if (!name && lastKnownName) name = lastKnownName; else lastKnownName = name;
                    if (!profile && lastKnownProfile) profile = lastKnownProfile; else lastKnownProfile = profile;

                    return { 
                        name: name, 
                        profile: profile, 
                        type: c[2]?.replace(/"/g, '').trim().toLowerCase(), 
                        link: c[3]?.replace(/"/g, '').trim()
                    };
                }).filter(i => i.name && i.link);

                document.getElementById('status').style.display = 'none';
                render();
            } catch (e) {
                document.getElementById('status').innerText = "PRIVATE DATABASE OFFLINE.";
            }
        }

        function render() {
            const aGrid = document.getElementById('actress-grid');
            const vGrid = document.getElementById('video-grid');
            const pGrid = document.getElementById('photo-grid');

            const names = [...new Set(allData.map(i => i.name))];
            aGrid.innerHTML = names.map(name => {
                const m = allData.filter(i => i.name === name);
                return `
                    <div class="card">
                        <div class="card-img-wrap"><img src="${m[0].profile}"></div>
                        <div class="card-info">
                            <h3>${name}</h3>
                            <div class="btn-row">
                                <button class="btn-sm" onclick="openOverlay('${name}', 'video')">WATCH</button>
                                <button class="btn-sm" onclick="openOverlay('${name}', 'photo')">VIEW</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            vGrid.innerHTML = allData.filter(i => i.type === 'video').slice(0, 12).map(i => createMediaItem(i)).join('');
            pGrid.innerHTML = allData.filter(i => i.type === 'photo').slice(0, 12).map(i => createMediaItem(i)).join('');
        }

        function createMediaItem(i) {
            if (i.type === 'video') {
                return `<div class="card"><div class="video-container">${getVideoElement(i.link)}</div></div>`;
            } else {
                return `<div class="card" style="height:auto;"><img src="${i.link}" style="width:100%; height:auto; display:block;"></div>`;
            }
        }

        function openOverlay(name, type) {
            const ov = document.getElementById('detail-view');
            const grid = document.getElementById('overlay-grid');
            document.getElementById('overlay-title').innerHTML = `${name}'s <span>${type}s</span>`;
            const filtered = allData.filter(i => i.name === name && i.type === type);
            grid.innerHTML = filtered.map(i => createMediaItem(i)).join('');
            ov.style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeOverlay() {
            document.getElementById('detail-view').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        fetchData();
    </script>
</body>
</html>
