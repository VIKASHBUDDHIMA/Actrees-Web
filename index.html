<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STAR STREAM | FAN GALLERY</title>
    
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Montserrat:wght@300;600;900&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <style>
        :root { --accent: #ff0055; --gold: #d4af37; --bg: #030303; --surface: #0a0a0c; --text: #ffffff; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        html { scroll-behavior: smooth; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }

        .nav { position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 25px 5%; background: linear-gradient(to bottom, rgba(3,3,3,0.9), transparent); z-index: 100; }
        .logo { font-family: 'Syncopate', sans-serif; font-weight: 700; font-size: 1.2rem; letter-spacing: 3px; color: var(--text); text-decoration: none; }
        .logo span { color: var(--accent); }

        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; position: relative; overflow: hidden; padding: 0 20px; }
        .hero::before { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-25%, -25%); width: 600px; height: 600px; background: radial-gradient(circle, rgba(255,0,85,0.15) 0%, transparent 70%); filter: blur(50px); z-index: -1; pointer-events: none; }
        .hero h1 { font-family: 'Syncopate', sans-serif; font-size: 5vw; font-weight: 700; letter-spacing: 15px; text-transform: uppercase; line-height: 1.1; margin-bottom: 20px; }
        .hero h1 span { color: transparent; -webkit-text-stroke: 1px rgba(255,255,255,0.3); }
        .hero p { font-size: 1rem; color: #888; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 40px; font-weight: 300; }

        .scroll-btn { border: none; background: transparent; color: var(--text); font-size: 0.9rem; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 10px; text-decoration: none;}
        .scroll-btn i { font-size: 1.5rem; color: var(--accent); animation: bounce 2s infinite; }

        @keyframes bounce { 0%, 20%, 50%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-10px); } 60% { transform: translateY(-5px); } }

        .section { padding: 100px 5%; position: relative; }
        .section-title { font-family: 'Syncopate', sans-serif; font-size: 2.2rem; letter-spacing: 5px; margin-bottom: 50px; text-transform: uppercase; position: relative; display: inline-block; }
        .section-title span { color: var(--accent); }

        .grid-container { position: relative; width: 100%; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; width: 100%; }

        .card { position: relative; background: var(--surface); border-radius: 16px; overflow: hidden; aspect-ratio: 3/4; border: 1px solid rgba(255,255,255,0.03); cursor: pointer; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .card-img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(20%) brightness(90%); transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1); }
        .card:hover .card-img { transform: scale(1.08); filter: grayscale(0%) brightness(100%); }
        
        .card-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(3,3,3,0.95) 0%, rgba(3,3,3,0.4) 40%, transparent 100%); display: flex; flex-direction: column; justify-content: flex-end; padding: 30px; opacity: 1; transition: all 0.4s; }
        .card-title { font-family: 'Syncopate', sans-serif; font-size: 1.1rem; letter-spacing: 2px; margin-bottom: 5px; text-transform: uppercase; }
        .card-tag { font-size: 0.75rem; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; font-weight: 600; display: flex; align-items: center; gap: 5px; }

        .media-item { position: relative; background: #000; border-radius: 16px; overflow: hidden; aspect-ratio: 9/16; width: 100%; border: 1px solid rgba(255,255,255,0.03); box-shadow: 0 30px 60px rgba(0,0,0,0.4); }
        
        .photo-item { aspect-ratio: 3/4 !important; }
        .photo-item img { width: 100%; height: 100%; object-fit: cover; }

        .modern-video-player { width: 100%; height: 100%; position: relative; overflow: hidden; background: #000; }
        .modern-video-player video { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }
        .modern-video-player iframe { width: 100%; height: 100%; border: none; }

        .play-overlay { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.2); pointer-events: none; transition: opacity 0.3s; }
        .play-overlay i { font-size: 4rem; color: #fff; opacity: 0.8; text-shadow: 0 0 20px rgba(0,0,0,0.5); transition: all 0.3s; transform: scale(0.8); }
        .modern-video-player.is-playing .play-overlay { opacity: 0; }
        .modern-video-player.is-playing .play-overlay i { transform: scale(1.2); }

        .control-icon { position: absolute; background: rgba(20,20,25,0.6); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); color: #fff; border-radius: 50%; width: 45px; height: 45px; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 10; transition: all 0.3s; }
        .control-icon:hover { background: var(--accent); border-color: var(--accent); transform: scale(1.05); }
        .mute-toggle { bottom: 25px; left: 25px; }
        .fullscreen-toggle { bottom: 25px; right: 25px; }

        .progress-bar-container { position: absolute; bottom: 0; left: 0; width: 100%; height: 5px; background: rgba(255,255,255,0.1); cursor: pointer; z-index: 11; transition: height 0.2s; }
        .progress-bar-container:hover { height: 8px; }
        .progress-fill { height: 100%; width: 0%; background: var(--accent); position: relative; transition: width 0.1s linear; }

        .modern-loader { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; background: #050507; z-index: 5; pointer-events: none; transition: opacity 0.5s ease; }
        .modern-loader span { width: 8px; height: 25px; background: var(--accent); margin: 0 3px; border-radius: 4px; animation: mod-loading 1s infinite ease-in-out; }
        .modern-loader span:nth-child(2) { animation-delay: 0.15s; }
        .modern-loader span:nth-child(3) { animation-delay: 0.3s; }
        @keyframes mod-loading { 0%, 100% { transform: scaleY(1); background: var(--accent); } 50% { transform: scaleY(1.8); background: var(--gold); } }
        .modern-video-player.is-loaded .modern-loader { opacity: 0; pointer-events: none; }

        .controls-desktop { display: flex; justify-content: flex-end; gap: 15px; position: absolute; top: 110px; right: 5%; z-index: 10; }
        .btn-nav { border: 1px solid rgba(255,255,255,0.1); background: var(--surface); color: var(--text); width: 50px; height: 50px; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; }
        .btn-nav:hover:not(:disabled) { background: var(--accent); border-color: var(--accent); }
        .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }

        .viewer-modal { position: fixed; inset: 0; background: rgba(3,3,3,0.98); z-index: 2000; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .viewer-modal.is-active { opacity: 1; pointer-events: auto; }
        .modal-close { position: absolute; top: 30px; right: 30px; background: transparent; border: none; color: #fff; font-size: 2rem; cursor: pointer; z-index: 10; }
        .modal-content-wrapper { width: 90%; max-width: 500px; aspect-ratio: 9/16; border-radius: 24px; overflow: hidden; box-shadow: 0 50px 100px rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.05); background: #000; }
        .modal-content-wrapper.is-photo { aspect-ratio: 3/4 !important; max-width: 700px; }

        @media (max-width: 1024px) { .grid { grid-template-columns: repeat(2, 1fr); } }

        @media (max-width: 768px) {
            .hero h1 { font-size: 10vw; letter-spacing: 8px; }
            .section { padding: 60px 20px; }
            .section-title { font-size: 1.6rem; margin-bottom: 30px; }
            .controls-desktop { display: none !important; }
            .grid-container { overflow-x: auto; overflow-y: hidden; width: 100vw; margin-left: -20px; padding-left: 20px; padding-right: 20px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
            .grid-container::-webkit-scrollbar { display: none; }
            .grid { display: flex; gap: 20px; width: max-content; padding-bottom: 20px; }
            .card { width: 260px; }
            .media-item { width: 280px; }
            #actress-controls-desktop { display: none !important; }
            #video-controls-desktop { display: none !important; }
            #photo-controls-desktop { display: none !important; }
        }
    </style>
</head>
<body>

    <nav class="nav">
        <a href="#" class="logo">STAR<span>STREAM</span></a>
    </nav>

    <header class="hero">
        <h1>FAN<span>GALLERY</span></h1>
        <p>Premium Streamer Media Hub</p>
        <a href="#actresses" class="scroll-btn">EXPLORE<i class="ri-arrow-down-line"></i></a>
    </header>

    <section class="section" id="actresses">
        <h2 class="section-title">CREATOR<span>S</span></h2>
        <div id="actress-controls-desktop" class="controls-desktop">
            <button class="btn-nav" onclick="scrollGrid('actress-grid', -1)" id="a-prev" disabled><i class="ri-arrow-left-line"></i></button>
            <button class="btn-nav" onclick="scrollGrid('actress-grid', 1)" id="a-more"><i class="ri-arrow-right-line"></i></button>
        </div>
        <div class="grid-container" id="actress-container">
            <div class="grid" id="actress-grid"></div>
        </div>
    </section>

    <section class="section" id="videos">
        <h2 class="section-title">HOT<span>VIDEOS</span></h2>
        <div id="video-controls-desktop" class="controls-desktop">
            <button class="btn-nav" onclick="scrollGrid('video-grid', -1)" id="v-prev" disabled><i class="ri-arrow-left-line"></i></button>
            <button class="btn-nav" onclick="scrollGrid('video-grid', 1)" id="v-more"><i class="ri-arrow-right-line"></i></button>
        </div>
        <div class="grid-container" id="video-container">
            <div class="grid" id="video-grid"></div>
        </div>
    </section>

    <section class="section" id="photos">
        <h2 class="section-title">EXCLUSIVE<span>PHOTOS</span></h2>
        <div id="photo-controls-desktop" class="controls-desktop">
            <button class="btn-nav" onclick="scrollGrid('photo-grid', -1)" id="p-prev" disabled><i class="ri-arrow-left-line"></i></button>
            <button class="btn-nav" onclick="scrollGrid('photo-grid', 1)" id="p-more"><i class="ri-arrow-right-line"></i></button>
        </div>
        <div class="grid-container" id="photo-container">
            <div class="grid" id="photo-grid"></div>
        </div>
    </section>

    <div class="viewer-modal" id="viewerModal">
        <button class="modal-close" onclick="closeModal()"><i class="ri-close-line"></i></button>
        <div class="modal-content-wrapper" id="modalContent"></div>
    </div>

    <script>
        const DATABASE_URL = 'https://script.google.com/macros/s/AKfycbyI_Vz66bT2_u9N7m48mBv7fR2v1f9wY2IuFv7W57_I3EitC6bE3K4S2x8lT5Z0X3Y/exec';
        const MY_WORKER_URL = 'https://lively-sun-75cb.buddhima200611.workers.dev';

        let names = [], shuffledVideos = [], shuffledPhotos = [];
        let aIndex = 0, vIndex = 0, pIndex = 0;
        let globalMuted = true;
        let hasUserUnmuted = false;

        async function fetchDatabase() {
            try {
                let res = await fetch(DATABASE_URL);
                let db = await res.json();
                
                names = db.models || [];
                
                let allVids = [], allPics = [];
                (db.content || []).forEach(item => {
                    if (item.type === 'video') allVids.push(item.url);
                    else if (item.type === 'photo') allPics.push(item.url);
                });

                shuffledVideos = shuffleArray(allVids);
                shuffledPhotos = shuffleArray(allPics);

                renderInitial();
            } catch (err) {
                console.error("Database fetch failed:", err);
            }
        }

        function shuffleArray(arr) {
            let array = [...arr];
            for (let i = array.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function getCols() {
            if (window.innerWidth > 1024) return 3;
            if (window.innerWidth > 768) return 2;
            return 1;
        }

        function renderInitial() {
            let cols = getCols();
            aIndex = window.innerWidth <= 768 ? names.length : cols * 2;
            
            vIndex = window.innerWidth <= 768 ? shuffledVideos.length : cols;
            pIndex = window.innerWidth <= 768 ? shuffledPhotos.length : cols;

            document.getElementById('actress-grid').innerHTML = names.slice(0, aIndex).map(n => createCard(n, false)).join('');
            document.getElementById('video-grid').innerHTML = shuffledVideos.slice(0, vIndex).map(i => createMediaItem(i, false)).join('');
            document.getElementById('photo-grid').innerHTML = shuffledPhotos.slice(0, pIndex).map(i => createMediaItem(i, true)).join('');

            if (names.length <= aIndex) document.getElementById('a-more').disabled = true;
            if (shuffledVideos.length <= vIndex) document.getElementById('v-more').disabled = true;
            if (shuffledPhotos.length <= pIndex) document.getElementById('p-more').disabled = true;

            attachVideoObserver();
        }

        function createCard(name, isDynamic) {
            let safeId = btoa(encodeURIComponent(name)).replace(/=/g, '');
            if (!isDynamic) {
                google.script.run.withSuccessHandler(url => {
                    let imgEl = document.getElementById('img-' + safeId);
                    if (imgEl && url) imgEl.src = url;
                }).getModelProfile(name);
            }
            return `
                <div class="card" onclick="filterByModel('${name}')">
                    <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=600" class="card-img" id="img-${safeId}">
                    <div class="card-overlay">
                        <h3 class="card-title">${name}</h3>
                        <span class="card-tag"><i class="ri-verified-badge-fill"></i> Model Verified</span>
                    </div>
                </div>
            `;
        }

        function createMediaItem(url, isPhoto) {
            if (isPhoto) {
                return `
                    <div class="grid-item media-item photo-item" onclick="openModal('${url}', true)">
                        <img src="${url}" loading="lazy">
                    </div>
                `;
            }
            return `<div class="grid-item media-item video-card-wrapper" onclick="handleVideoClick(this)">${getVideoElement(url)}</div>`;
        }

        function getVideoElement(u) {
            if (u.includes('youtube.com')) {
                u = u.replace('watch?v=', 'embed/');
                return `<iframe src="${u}" allowfullscreen loading="lazy"></iframe>`;
            }
            
            let srcUrl = u;
            if (u.includes('docs.google.com/uc') || u.includes('drive.google.com')) {
                let fileIdMatch = u.match(/[-\w]{25,}/);
                if (fileIdMatch) srcUrl = `${MY_WORKER_URL}/?id=${fileIdMatch[0]}`;
            }

            let initialMuteState = window.innerWidth <= 768 ? 'muted' : '';
            let muteIconState = window.innerWidth <= 768 ? 'mute' : 'up';

            return `
                <div class="modern-video-player">
                    <div class="modern-loader"><span></span><span></span><span></span></div>
                    <video data-src="${srcUrl}#t=0.1" playsinline webkit-playsinline loop preload="metadata" ${initialMuteState} class="custom-video" style="background-color: #000;"></video>
                    
                    <div class="play-overlay"><i class="ri-play-fill"></i></div>
                    
                    <button class="control-icon mute-toggle"><i class="ri-volume-${muteIconState}-fill"></i></button>
                    <button class="control-icon fullscreen-toggle"><i class="ri-fullscreen-line"></i></button>
                    
                    <div class="progress-bar-container">
                        <div class="progress-fill"></div>
                    </div>
                </div>
            `;
        }

        function attachVideoObserver() {
            const videoWrappers = Array.from(document.querySelectorAll('.video-card-wrapper'));
            if (videoWrappers.length === 0) return;

            const bufferObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const activeWrapper = entry.target;
                        const activeIndex = videoWrappers.indexOf(activeWrapper);
                        if (activeIndex === -1) return;

                        videoWrappers.forEach((wrapper, idx) => {
                            const video = wrapper.querySelector('video');
                            if (!video) return;

                            const player = video.closest('.modern-video-player');
                            const dataSrc = video.getAttribute('data-src');

                            if (Math.abs(idx - activeIndex) <= 1) {
                                if (!video.src || video.src !== dataSrc) {
                                    video.src = dataSrc;
                                    video.load();
                                }

                                video.onloadeddata = () => {
                                    player.classList.add('is-loaded');
                                };

                                if (idx === activeIndex) {
                                    video.muted = globalMuted;
                                    updateAllMuteIcons();
                                    
                                    video.currentTime = 0; 
                                    
                                    let playPromise = video.play();
                                    if (playPromise !== undefined) {
                                        playPromise.then(() => {
                                            player.classList.add('is-playing');
                                        }).catch(e => {});
                                    }
                                } else {
                                    video.pause();
                                    player.classList.remove('is-playing');
                                }
                            } else {
                                if (video.src) {
                                    video.pause();
                                    video.removeAttribute('src');
                                    video.load();
                                    player.classList.remove('is-playing', 'is-loaded');
                                }
                            }
                        });
                    }
                });
            }, { threshold: 0.5 });

            videoWrappers.forEach(wrapper => bufferObserver.observe(wrapper));
        }

        function handleVideoClick(wrapper) {
            if (window.innerWidth <= 768) return; 
            const video = wrapper.querySelector('video');
            if (!video) return;

            const player = video.closest('.modern-video-player');
            const dataSrc = video.getAttribute('data-src');

            if (!video.src || video.src !== dataSrc) {
                video.src = dataSrc;
                video.load();
                player.classList.add('is-loaded');
            }

            if (video.paused) {
                document.querySelectorAll('video').forEach(v => {
                    v.pause();
                    v.closest('.modern-video-player').classList.remove('is-playing');
                });
                video.play();
                player.classList.add('is-playing');
            } else {
                video.pause();
                player.classList.remove('is-playing');
            }
        }

        document.addEventListener('click', function(e) {
            let muteBtn = e.target.closest('.mute-toggle');
            if (muteBtn) {
                e.stopPropagation();
                const video = muteBtn.closest('.modern-video-player').querySelector('video');
                if (!video) return;

                hasUserUnmuted = true;
                globalMuted = !globalMuted;
                
                document.querySelectorAll('video').forEach(v => {
                    v.muted = globalMuted;
                });
                updateAllMuteIcons();
                return;
            }

            let fsBtn = e.target.closest('.fullscreen-toggle');
            if (fsBtn) {
                e.stopPropagation();
                const video = fsBtn.closest('.modern-video-player').querySelector('video');
                if (!video) return;

                if (video.requestFullscreen) video.requestFullscreen();
                else if (video.webkitRequestFullscreen) video.webkitRequestFullscreen();
                else if (video.msRequestFullscreen) video.msRequestFullscreen();
                return;
            }
            
            let progressBar = e.target.closest('.progress-bar-container');
            if (progressBar) {
                e.stopPropagation();
                const video = progressBar.closest('.modern-video-player').querySelector('video');
                if (!video || !video.duration) return;
                
                const rect = progressBar.getBoundingClientRect();
                const pos = (e.clientX - rect.left) / rect.width;
                video.currentTime = pos * video.duration;
            }
        });

        document.addEventListener('timeupdate', function(e) {
            if (e.target.tagName === 'VIDEO') {
                const video = e.target;
                const fill = video.closest('.modern-video-player').querySelector('.progress-fill');
                if (fill && video.duration) {
                    const pct = (video.currentTime / video.duration) * 100;
                    fill.style.width = pct + '%';
                }
            }
        }, true);

        function updateAllMuteIcons() {
            document.querySelectorAll('.mute-toggle i').forEach(icon => {
                if (globalMuted) {
                    icon.className = 'ri-volume-mute-fill';
                } else {
                    icon.className = 'ri-volume-up-fill';
                }
            });
        }

        function scrollGrid(gridId, dir) {
            let cols = getCols();
            let step = cols;
            
            if (gridId === 'actress-grid') {
                if (dir > 0) {
                    let nextBatch = names.slice(aIndex, aIndex + step);
                    if (nextBatch.length > 0) {
                        document.getElementById(gridId).insertAdjacentHTML('beforeend', nextBatch.map(n => createCard(n, true)).join(''));
                        aIndex += nextBatch.length;
                    }
                }
                document.getElementById('a-prev').disabled = false;
                if (aIndex >= names.length) document.getElementById('a-more').disabled = true;
            } else if (gridId === 'video-grid') {
                if (dir > 0) {
                    let nextBatch = shuffledVideos.slice(vIndex, vIndex + step);
                    if (nextBatch.length > 0) {
                        document.getElementById(gridId).insertAdjacentHTML('beforeend', nextBatch.map(i => createMediaItem(i, false)).join(''));
                        vIndex += nextBatch.length;
                        attachVideoObserver();
                    }
                }
                document.getElementById('v-prev').disabled = false;
                if (vIndex >= shuffledVideos.length) document.getElementById('v-more').disabled = true;
            } else if (gridId === 'photo-grid') {
                if (dir > 0) {
                    let nextBatch = shuffledPhotos.slice(pIndex, pIndex + step);
                    if (nextBatch.length > 0) {
                        document.getElementById(gridId).insertAdjacentHTML('beforeend', nextBatch.map(i => createMediaItem(i, true)).join(''));
                        pIndex += nextBatch.length;
                    }
                }
                document.getElementById('p-prev').disabled = false;
                if (pIndex >= shuffledPhotos.length) document.getElementById('p-more').disabled = true;
            }

            let container = document.getElementById(gridId.replace('grid', 'container'));
            let scrollAmt = container.clientWidth * 0.8 * dir;
            container.scrollBy({ left: scrollAmt, behavior: 'smooth' });
        }

        function openModal(url, isPhoto) {
            let content = document.getElementById('modalContent');
            let wrapper = document.getElementById('viewerModal');
            
            if (isPhoto) {
                content.className = "modal-content-wrapper is-photo";
                content.innerHTML = `<img src="${url}" style="width:100%; height:100%; object-fit:cover;">`;
            } else {
                content.className = "modal-content-wrapper";
                content.innerHTML = getVideoElement(url);
                setTimeout(() => {
                    let v = content.querySelector('video');
                    if (v) {
                        v.src = v.getAttribute('data-src');
                        v.load();
                        v.muted = false;
                        v.play();
                        v.closest('.modern-video-player').classList.add('is-playing', 'is-loaded');
                    }
                }, 300);
            }
            wrapper.classList.add('is-active');
        }

        function closeModal() {
            let wrapper = document.getElementById('viewerModal');
            let content = document.getElementById('modalContent');
            let v = content.querySelector('video');
            if (v) {
                v.pause();
                v.src = "";
                v.load();
            }
            content.innerHTML = "";
            wrapper.classList.remove('is-active');
        }

        async function filterByModel(modelName) {
            try {
                let res = await fetch(`${DATABASE_URL}?model=${encodeURIComponent(modelName)}`);
                let data = await res.json();
                
                let vGrid = document.getElementById('video-grid');
                let pGrid = document.getElementById('photo-grid');
                
                let vids = [], pics = [];
                (data || []).forEach(item => {
                    if (item.type === 'video') vids.push(item.url);
                    else if (item.type === 'photo') pics.push(item.url);
                });

                vGrid.innerHTML = vids.length ? vids.map(i => createMediaItem(i, false)).join('') : '<p style="padding:20px; color:#666;">No videos found.</p>';
                pGrid.innerHTML = pics.length ? pics.map(i => createMediaItem(i, true)).join('') : '<p style="padding:20px; color:#666;">No photos found.</p>';
                
                attachVideoObserver();
                
                document.getElementById('videos').scrollIntoView({ behavior: 'smooth' });
            } catch (err) {
                console.error("Filtering failed:", err);
            }
        }

        window.onload = fetchDatabase;
    </script>
</body>
</html>
