<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS VIP | EXCLUSIVE ARCHIVE</title>
    
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Playfair+Display:ital,wght@1,700&swap" rel="stylesheet">

    <style>
        :root { --accent: #ff0055; --gold: #d4af37; --bg: #050505; --surface: #0a0a0c; --text: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; scroll-behavior: smooth; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }

        nav { 
            position: fixed; width: 100%; padding: 15px 6%; display: flex; 
            justify-content: space-between; align-items: center; z-index: 1000; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            backdrop-filter: blur(10px);
        }
        .logo { font-size: 1.5rem; font-weight: 900; letter-spacing: 3px; color: var(--accent); text-decoration: none; text-shadow: 0 0 10px var(--accent); }
        .logo span { color: white; font-style: italic; }
        .nav-links a { color: #eee; text-decoration: none; margin-left: 20px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; transition: 0.3s; }
        .nav-links a:hover { color: var(--accent); }

        #home { 
            height: 100vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; text-align: center;
            background: radial-gradient(circle at 70% 30%, rgba(255, 0, 85, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 20% 70%, rgba(212, 175, 55, 0.1) 0%, transparent 40%);
            position: relative;
        }
        #home::after { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.3); z-index: 1; }
        .hero-content { z-index: 10; }
        #home h1 { font-family: 'Playfair Display', serif; font-size: clamp(3rem, 12vw, 8rem); font-style: italic; line-height: 1; margin-bottom: 10px; }
        #home h1 span { color: var(--accent); }
        #home p { font-size: 1.2rem; letter-spacing: 5px; text-transform: uppercase; color: var(--gold); margin-bottom: 40px; font-weight: 300; }

        .vip-btn { padding: 15px 50px; background: transparent; color: white; border: 2px solid var(--accent); cursor: pointer; transition: 0.5s; font-weight: 800; letter-spacing: 3px; }
        .vip-btn:hover { background: var(--accent); }

        section { padding: 80px 6%; }
        .section-title { font-size: 2.5rem; font-weight: 900; margin-bottom: 40px; text-transform: uppercase; text-align: center; letter-spacing: 2px; }
        .section-title span { color: var(--accent); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        
        /* Actress Cards Smaller */
        #actress-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
        #actress-grid .card-img-wrap { height: 250px; }

        .card { background: var(--surface); position: relative; overflow: hidden; border: 1px solid #1a1a1a; transition: 0.4s; }
        .card:hover { border-color: var(--accent); }
        .card-img-wrap { width: 100%; position: relative; }
        .card img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.8); transition: 0.5s; }

        .video-container { position: relative; width: 100%; padding-top: 177.77%; background: #000; }
        .video-container iframe, .video-container video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; object-fit: cover; }

        .card-info { position: absolute; bottom: 0; width: 100%; padding: 15px; background: linear-gradient(to top, #000, transparent); text-align: center; }
        .card-info h3 { font-size: 1rem; margin-bottom: 10px; }
        
        .btn-row { display: flex; gap: 5px; }
        .btn-sm { flex: 1; padding: 8px; background: rgba(255,255,255,0.05); color: white; border: 1px solid #333; cursor: pointer; font-size: 0.6rem; font-weight: 700; }
        .btn-sm:hover { background: var(--accent); }

        /* Controls */
        .controls { display: flex; justify-content: center; gap: 15px; margin-top: 30px; }
        .control-btn { background: transparent; border: 1px solid #444; color: #888; padding: 10px 25px; cursor: pointer; font-weight: 700; text-transform: uppercase; font-size: 0.7rem; }
        .control-btn:hover { border-color: var(--accent); color: white; }

        /* Mobile Slider for Videos */
        @media (max-width: 768px) {
            .nav-links { display: none; }
            #video-grid { 
                display: flex; overflow-x: auto; scroll-snap-type: x mandatory; gap: 15px; 
                padding-bottom: 20px; scrollbar-width: none;
            }
            #video-grid::-webkit-scrollbar { display: none; }
            #video-grid .card { min-width: 80%; scroll-snap-align: center; }
            .mobile-slider-controls { display: flex !important; justify-content: space-between; position: absolute; width: 100%; top: 50%; left: 0; transform: translateY(-50%); z-index: 100; pointer-events: none; }
            .slider-arrow { pointer-events: auto; background: rgba(255, 0, 85, 0.7); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }
            #video-controls-desktop { display: none; }
            #videos { position: relative; }
        }

        .mobile-slider-controls { display: none; }

        #detail-view { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: none; overflow-y: auto; padding: 80px 6%; }
        .close-btn { position: fixed; top: 20px; right: 20px; font-size: 2.5rem; color: var(--accent); cursor: pointer; }
    </style>
</head>
<body>

    <nav>
        <a href="#home" class="logo">NEXUS<span>VIP</span></a>
        <div class="nav-links">
            <a href="#home">Home</a>
            <a href="#actresses">Models</a>
            <a href="#videos">VIP Clips</a>
            <a href="#photos">Galleries</a>
            <a href="contact.html">Join Us</a>
        </div>
    </nav>

    <div id="detail-view">
        <span class="close-btn" onclick="closeOverlay()">&times;</span>
        <h2 id="overlay-title" class="section-title">EXCLUSIVE <span>CONTENT</span></h2>
        <div class="grid" id="overlay-grid"></div>
    </div>

    <section id="home">
        <div class="hero-content">
            <p>PREMIUM ACCESS ONLY</p>
            <h1>Pure <span>Desire.</span></h1>
            <button class="vip-btn" onclick="location.href='#actresses'">ENTER THE ARCHIVE</button>
        </div>
    </section>

    <section id="actresses">
        <h2 class="section-title">TOP <span>MODELS</span></h2>
        <div id="status" style="text-align:center;">Loading Database...</div>
        <div class="grid" id="actress-grid"></div>
    </section>

    <section id="videos" style="background: #070707;">
        <h2 class="section-title">VIP <span>CLIPS</span></h2>
        
        <div class="mobile-slider-controls">
            <button class="slider-arrow" onclick="scrollSlider('left')"><i class="ri-arrow-left-s-line"></i></button>
            <button class="slider-arrow" onclick="scrollSlider('right')"><i class="ri-arrow-right-s-line"></i></button>
        </div>

        <div class="grid" id="video-grid"></div>

        <div class="controls" id="video-controls-desktop">
            <button class="control-btn" id="v-more" onclick="loadMoreVideos()">See More</button>
            <button class="control-btn" id="v-hide" onclick="hideVideos()" style="display:none;">Hide</button>
        </div>
    </section>

    <section id="photos">
        <h2 class="section-title">EXCLUSIVE <span>SHOTS</span></h2>
        <div class="grid" id="photo-grid"></div>
        <div class="controls">
            <button class="control-btn" id="p-more" onclick="loadMorePhotos()">See More</button>
            <button class="control-btn" id="p-hide" onclick="hidePhotos()" style="display:none;">Hide</button>
        </div>
    </section>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTr0Iyy40tk0ruBQhi1yYtf4-mh26HPt3eZAZzVqhj62Hk_DH01r41cwvkEY40TWmnC1ZwKjFd03gJa/pub?gid=1227904236&single=true&output=csv'; 

        let allData = [];
        let shuffledVideos = [];
        let shuffledPhotos = [];
        let videoIndex = 3;
        let photoIndex = 3;

        async function fetchData() {
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                const rows = text.split('\n').slice(1);
                
                let lastKnownName = "", lastKnownProfile = "";
                allData = rows.map(r => {
                    const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    let name = c[0]?.replace(/"/g, '').trim();
                    let profile = c[1]?.replace(/"/g, '').trim();
                    if (!name && lastKnownName) name = lastKnownName; else lastKnownName = name;
                    if (!profile && lastKnownProfile) profile = lastKnownProfile; else lastKnownProfile = profile;
                    return { name, profile, type: c[2]?.replace(/"/g, '').trim().toLowerCase(), link: c[3]?.replace(/"/g, '').trim() };
                }).filter(i => i.name && i.link);

                shuffledVideos = allData.filter(i => i.type === 'video').sort(() => Math.random() - 0.5);
                shuffledPhotos = allData.filter(i => i.type === 'photo').sort(() => Math.random() - 0.5);

                document.getElementById('status').style.display = 'none';
                renderInitial();
            } catch (e) { console.error(e); }
        }

        function renderInitial() {
            const aGrid = document.getElementById('actress-grid');
            const vGrid = document.getElementById('video-grid');
            const pGrid = document.getElementById('photo-grid');

            const names = [...new Set(allData.map(i => i.name))];
            aGrid.innerHTML = names.map(name => {
                const m = allData.filter(i => i.name === name);
                return `<div class="card"><div class="card-img-wrap"><img src="${m[0].profile}"></div><div class="card-info"><h3>${name}</h3><div class="btn-row"><button class="btn-sm" onclick="openOverlay('${name}', 'video')">WATCH</button><button class="btn-sm" onclick="openOverlay('${name}', 'photo')">VIEW</button></div></div></div>`;
            }).join('');

            // Mobile එකේදී ඔක්කොම වීඩියෝ ලෝඩ් කරනවා slider එකට
            if (window.innerWidth <= 768) {
                vGrid.innerHTML = shuffledVideos.map(i => createMediaItem(i)).join('');
            } else {
                vGrid.innerHTML = shuffledVideos.slice(0, 3).map(i => createMediaItem(i)).join('');
            }
            
            pGrid.innerHTML = shuffledPhotos.slice(0, 3).map(i => createMediaItem(i)).join('');
        }

        function loadMoreVideos() {
            videoIndex += 3;
            const vGrid = document.getElementById('video-grid');
            vGrid.innerHTML = shuffledVideos.slice(0, videoIndex).map(i => createMediaItem(i)).join('');
            if (videoIndex >= shuffledVideos.length) document.getElementById('v-more').style.display = 'none';
            document.getElementById('v-hide').style.display = 'block';
        }

        function hideVideos() {
            videoIndex = 3;
            renderInitial();
            document.getElementById('v-more').style.display = 'block';
            document.getElementById('v-hide').style.display = 'none';
            location.href = "#videos";
        }

        function loadMorePhotos() {
            photoIndex += 3;
            const pGrid = document.getElementById('photo-grid');
            pGrid.innerHTML = shuffledPhotos.slice(0, photoIndex).map(i => createMediaItem(i)).join('');
            if (photoIndex >= shuffledPhotos.length) document.getElementById('p-more').style.display = 'none';
            document.getElementById('p-hide').style.display = 'block';
        }

        function hidePhotos() {
            photoIndex = 3;
            renderInitial();
            document.getElementById('p-more').style.display = 'block';
            document.getElementById('p-hide').style.display = 'none';
            location.href = "#photos";
        }

        function scrollSlider(dir) {
            const grid = document.getElementById('video-grid');
            const scrollAmt = grid.clientWidth * 0.8;
            grid.scrollBy({ left: dir === 'right' ? scrollAmt : -scrollAmt, behavior: 'smooth' });
        }

        function createMediaItem(i) {
            if (i.type === 'video') return `<div class="card"><div class="video-container">${getVideoElement(i.link)}</div></div>`;
            return `<div class="card" style="height:auto;"><img src="${i.link}" style="width:100%; height:auto;"></div>`;
        }

        function getVideoElement(url) {
            let u = url.trim();
            if (u.includes('youtube.com/watch?v=')) u = u.replace('watch?v=', 'embed/');
            else if (u.includes('youtu.be/')) u = u.replace('youtu.be/', 'youtube.com/embed/');
            else if (u.includes('drive.google.com')) u = u.replace('/view', '/preview');
            
            if (u.toLowerCase().endsWith('.mp4')) return `<video controls playsinline><source src="${u}" type="video/mp4"></video>`;
            return `<iframe src="${u}" allowfullscreen></iframe>`;
        }

        function openOverlay(name, type) {
            const ov = document.getElementById('detail-view');
            const grid = document.getElementById('overlay-grid');
            document.getElementById('overlay-title').innerHTML = `${name}'s <span>${type}s</span>`;
            grid.innerHTML = allData.filter(i => i.name === name && i.type === type).map(i => createMediaItem(i)).join('');
            ov.style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeOverlay() { document.getElementById('detail-view').style.display = 'none'; document.body.style.overflow = 'auto'; }

        fetchData();
    </script>
</body>
</html>
