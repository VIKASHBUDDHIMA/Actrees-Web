<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Content | STAR STREAM</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ff0055; --bg: #050505; --surface: #111113; --text: #ffffff; }
        * { box-sizing: border-box; transition: all 0.3s ease; }
        body { background: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; }
        
        nav { 
            width: 100%; padding: 15px 8%; background: rgba(0,0,0,0.9); 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-family: 'Syncopate'; color: var(--accent); text-decoration: none; font-size: 1.2rem; }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a { color: var(--text); text-decoration: none; font-size: 0.9rem; font-weight: 600; }
        .nav-links a:hover { color: var(--accent); }

        .container { max-width: 600px; margin: 50px auto; padding: 30px; background: var(--surface); border-radius: 12px; border: 1px solid #333; }
        h2 { color: var(--accent); text-align: center; margin-bottom: 30px; font-family: 'Syncopate'; }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; font-weight: 600; color: #ccc; }
        select, input[type="text"], input[type="file"] { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: white; border-radius: 6px; outline: none; }
        select:focus, input[type="text"]:focus { border-color: var(--accent); }

        #newActressFields { display: none; margin-top: 15px; padding: 15px; background: #1a1a1a; border-radius: 6px; border-left: 3px solid var(--accent); }
        
        .btn { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 1rem; margin-top: 10px; }
        .btn:hover { background: #d40047; }
        .btn:disabled { background: #555; cursor: not-allowed; }

        .progress-container { display: none; margin-top: 20px; }
        .progress-bar-bg { width: 100%; background: #333; border-radius: 6px; height: 10px; overflow: hidden; margin-top: 10px; }
        .progress-bar { width: 0%; height: 100%; background: var(--accent); transition: width 0.3s; }
        .status-text { text-align: center; font-size: 0.9rem; color: #aaa; margin-top: 10px; }

        #successView { display: none; text-align: center; }
        #successView h3 { color: #00ff88; margin-bottom: 10px; }
    </style>
</head>
<body>
    <nav>
        <a href="#" class="logo">STAR STREAM</a>
        <div class="nav-links">
            <a href="index.html">GALLERY</a>
        </div>
    </nav>

    <div class="container">
        <div id="formView">
            <h2>UPLOAD CONTENT</h2>

            <div class="form-group">
                <label>UPLOAD METHOD</label>
                <select id="uploadMethod" onchange="toggleMethod()">
                    <option value="file">FILE UPLOAD</option>
                    <option value="tiktok">TIKTOK LINK</option>
                </select>
            </div>

            <div class="form-group">
                <label>CONTENT TYPE</label>
                <select id="contentType">
                    <option value="PHOTO">PHOTO</option>
                    <option value="VIDEO">VIDEO</option>
                </select>
            </div>

            <div class="form-group">
                <label>SELECT MODEL / ACTRESS</label>
                <select id="actressSelect" onchange="toggleNewFields()">
                    <option value="">Loading...</option>
                    <option value="NEW">+ ADD NEW</option>
                </select>
            </div>

            <div id="newActressFields">
                <div class="form-group">
                    <label>NAME</label>
                    <input type="text" id="newName" placeholder="Enter Name">
                </div>
                <div class="form-group">
                    <label>PROFILE PICTURE</label>
                    <input type="file" id="profilePic" accept="image/*">
                </div>
            </div>

            <div id="fileUploadSection" class="form-group">
                <label>UPLOAD MEDIA FILES</label>
                <input type="file" id="contentFiles" multiple accept="image/*,video/*">
            </div>

            <div id="tiktokUploadSection" class="form-group" style="display: none;">
                <label>TIKTOK VIDEO LINK</label>
                <input type="text" id="tiktokLink" placeholder="Paste TikTok URL here">
            </div>

            <button class="btn" id="uploadBtn" onclick="upload()">UPLOAD TO DRIVE</button>

            <div class="progress-container" id="progressContainer">
                <div class="status-text" id="statusText">Initializing...</div>
                <div class="progress-bar-bg">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
            </div>
        </div>

        <div id="successView">
            <h3>UPLOAD SUCCESSFUL!</h3>
            <p>Content has been sent for admin approval.</p>
            <button class="btn" onclick="location.reload()" style="margin-top: 20px;">UPLOAD MORE</button>
        </div>
    </div>

    <script>
        // MUST UPDATE: Add your deployed Apps Script URL here
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx6BMo92BLHsaViQjqIVXsz1RThusWr6iRd4BmZuogq1gca1AmbE3Bjwzp7SwvYuu7h/exec';

        window.onload = async () => {
            try {
                const res = await fetch(SCRIPT_URL + "?action=getNames");
                const names = await res.json();
                const select = document.getElementById('actressSelect');
                select.innerHTML = '<option value="" disabled selected>Select Model</option>';
                names.forEach(n => {
                    select.innerHTML += `<option value="${n}">${n}</option>`;
                });
                select.innerHTML += '<option value="NEW">+ ADD NEW</option>';
            } catch (e) {
                console.log("Error loading names. Make sure SCRIPT_URL is correct.");
            }
        };

        function toggleMethod() {
            const method = document.getElementById('uploadMethod').value;
            if (method === 'file') {
                document.getElementById('fileUploadSection').style.display = 'block';
                document.getElementById('tiktokUploadSection').style.display = 'none';
                document.getElementById('contentType').disabled = false;
            } else {
                document.getElementById('fileUploadSection').style.display = 'none';
                document.getElementById('tiktokUploadSection').style.display = 'block';
                document.getElementById('contentType').value = 'VIDEO';
                document.getElementById('contentType').disabled = true;
            }
        }

        function toggleNewFields() {
            const val = document.getElementById('actressSelect').value;
            document.getElementById('newActressFields').style.display = (val === 'NEW') ? 'block' : 'none';
        }

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve({
                    base64: reader.result.split(',')[1],
                    type: file.type
                });
                reader.onerror = error => reject(error);
            });
        }

        async function upload() {
            const method = document.getElementById('uploadMethod').value;
            const contentType = document.getElementById('contentType').value;
            const actressSelect = document.getElementById('actressSelect').value;
            const newName = document.getElementById('newName').value;
            const profilePic = document.getElementById('profilePic').files[0];

            if (!actressSelect) return alert("Please select a model.");
            if (actressSelect === 'NEW' && !newName) return alert("Please enter the new model's name.");
            if (actressSelect === 'NEW' && !profilePic) return alert("Please select a profile picture for the new model.");

            let files = [];
            let tkLink = "";

            if (method === 'file') {
                files = document.getElementById('contentFiles').files;
                if (files.length === 0) return alert("Please select files to upload.");
            } else {
                tkLink = document.getElementById('tiktokLink').value;
                if (!tkLink) return alert("Please paste a TikTok link.");
            }

            const btn = document.getElementById('uploadBtn');
            const progContainer = document.getElementById('progressContainer');
            const statusText = document.getElementById('statusText');
            const bar = document.getElementById('progressBar');

            btn.style.display = 'none';
            progContainer.style.display = 'block';

            try {
                let profileData = null;
                if (actressSelect === 'NEW') {
                    statusText.innerText = "Processing Profile Picture...";
                    profileData = await fileToBase64(profilePic);
                }

                if (method === 'tiktok') {
                    statusText.innerText = "Fetching TikTok Data...";
                    bar.style.width = '20%';

                    const apiUrl = `https://www.tikwm.com/api/?url=${encodeURIComponent(tkLink)}&hd=1`;
                    const tkResp = await fetch(apiUrl);
                    const tkData = await tkResp.json();

                    if (tkData.code !== 0 || !tkData.data || !tkData.data.play) {
                        throw new Error("Invalid TikTok link or API error");
                    }

                    statusText.innerText = "Downloading TikTok to Server...";
                    bar.style.width = '40%';

                    const videoResp = await fetch(tkData.data.play);
                    const videoBlob = await videoResp.blob();

                    statusText.innerText = "Processing Video Data...";
                    bar.style.width = '60%';

                    const base64Data = await new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onloadend = () => resolve(reader.result.split(',')[1]);
                        reader.onerror = reject;
                        reader.readAsDataURL(videoBlob);
                    });

                    statusText.innerText = "Uploading to Drive... (1/1)";
                    bar.style.width = '80%';

                    const payload = {
                        name: (actressSelect === 'NEW') ? newName : actressSelect,
                        type: 'VIDEO',
                        fileName: `TikTok_${Date.now()}.mp4`,
                        fileType: videoBlob.type || 'video/mp4',
                        fileBase64: base64Data
                    };

                    // Send profile picture only once
                    if (profileData) {
                        payload.profileBase64 = profileData.base64;
                        payload.profileType = profileData.type;
                    }

                    const response = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
                    const result = await response.text();
                    if (!result.includes("Success")) throw new Error(result);

                } else {
                    // Normal File Upload Logic
                    for (let i = 0; i < files.length; i++) {
                        statusText.innerText = `Uploading File ${i + 1} of ${files.length}...`;
                        bar.style.width = `${((i) / files.length) * 100}%`;

                        const currentFile = files[i];
                        const mediaData = await fileToBase64(currentFile);

                        const payload = {
                            name: (actressSelect === 'NEW') ? newName : actressSelect,
                            type: contentType,
                            fileName: currentFile.name,
                            fileType: currentFile.type,
                            fileBase64: mediaData.base64
                        };

                        if (i === 0 && profileData) {
                            payload.profileBase64 = profileData.base64;
                            payload.profileType = profileData.type;
                        }

                        const response = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
                        const result = await response.text();
                        if (!result.includes("Success")) throw new Error("Failed to upload file " + (i + 1) + ": " + result);

                        bar.style.width = `${((i + 1) / files.length) * 100}%`;
                    }
                }

                // Upload Completion
                bar.style.width = '100%';
                document.getElementById('formView').style.display = 'none';
                document.getElementById('successView').style.display = 'block';

            } catch (error) {
                console.error("Upload Error:", error);
                alert("Error: " + error.message);
                btn.style.display = 'block';
                progContainer.style.display = 'none';
            }
        }
    </script>
</body>
</html>
