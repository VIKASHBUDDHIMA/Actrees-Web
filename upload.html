<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPLOAD | STAR STREAM</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Montserrat:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background: #030303; color: white; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .upload-box { background: #0a0a0c; padding: 40px; border-radius: 20px; width: 90%; max-width: 500px; border: 1px solid #ff0055; text-align: center; }
        h2 { font-family: 'Syncopate'; color: #ff0055; margin-bottom: 20px; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; }
        input, select { background: #1a1a1c; color: white; border: 1px solid #333; }
        button { background: #ff0055; color: white; font-weight: 900; cursor: pointer; transition: 0.3s; }
        button:hover { transform: scale(1.05); background: #d00045; }
    </style>
</head>
<body>
    <div class="upload-box">
        <h2>SUBMIT <span>CONTENT</span></h2>
        <input type="text" id="name" placeholder="Actress Name" required>
        <input type="text" id="profile" placeholder="Profile Image URL" required>
        <select id="type">
            <option value="video">Video Clip</option>
            <option value="photo">Photo</option>
        </select>
        <input type="file" id="fileInput" accept="image/*,video/*" required>
        <button onclick="handleUpload()" id="upBtn">UPLOAD NOW</button>
        <p id="msg"></p>
    </div>

    <script>
        const SCRIPT_URL = "YOUR_SCRIPT_URL_HERE"; 

        function handleUpload() {
            const file = document.getElementById('fileInput').files[0];
            const btn = document.getElementById('upBtn');
            if(!file) return alert("Please select a file!");

            btn.innerText = "UPLOADING...";
            btn.disabled = true;

            const reader = new FileReader();
            reader.onload = function(e) {
                const base64 = e.target.result.split(',')[1];
                const data = {
                    fileBase64: base64,
                    fileType: file.type,
                    fileName: file.name,
                    name: document.getElementById('name').value,
                    profile: document.getElementById('profile').value,
                    type: document.getElementById('type').value
                };

                fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(data)
                }).then(() => {
                    document.getElementById('msg').innerText = "සාර්ථකව යොමු කළා!";
                    btn.innerText = "UPLOAD NOW";
                    btn.disabled = false;
                });
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
