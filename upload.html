<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uploader | STAR STREAM</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ff0055; --bg: #050505; --surface: #111113; --text: #ffffff; }
        * { box-sizing: border-box; transition: all 0.3s ease; }
        body { background: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }

        nav { width: 100%; padding: 20px 5%; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 100; }
        .logo { font-family: 'Syncopate'; font-size: 1.2rem; color: var(--accent); text-decoration: none; letter-spacing: 2px; }
        .nav-links a { color: #888; text-decoration: none; font-size: 0.8rem; margin-left: 20px; text-transform: uppercase; font-weight: 600; }
        .nav-links a:hover { color: var(--accent); }

        .container { max-width: 500px; margin: 40px auto; padding: 20px; width: 92%; }
        .card { background: var(--surface); padding: 30px; border-radius: 24px; border: 1px solid #222; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        h2 { font-family: 'Syncopate'; font-size: 1rem; color: var(--accent); text-align: center; margin-bottom: 30px; }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.75rem; color: #777; margin-bottom: 8px; font-weight: 600; text-transform: uppercase; }
        
        select, input[type="text"] { width: 100%; padding: 14px; background: #1a1a1e; border: 1px solid #333; color: white; border-radius: 12px; outline: none; }

        /* File Upload Styling - Fixed Text Wrap */
        .file-upload { border: 2px dashed #333; border-radius: 12px; padding: 20px; text-align: center; cursor: pointer; background: #1a1a1e; position: relative; overflow: hidden; }
        .file-upload span { font-size: 0.8rem; color: #aaa; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
        .file-upload input { position: absolute; width: 100%; height: 100%; top: 0; left: 0; opacity: 0; cursor: pointer; }

        #progressContainer { display: none; margin: 25px 0; background: #222; height: 10px; border-radius: 5px; overflow: hidden; }
        #progressBar { width: 0%; height: 100%; background: linear-gradient(90deg, #ff0055, #ff5e00); }

        .btn { width: 100%; padding: 16px; background: var(--accent); border: none; color: white; font-size: 0.9rem; font-weight: 700; border-radius: 14px; cursor: pointer; margin-top: 20px; box-shadow: 0 10px 20px rgba(255, 0, 85, 0.3); }
        .btn:disabled { background: #444; }

        #statusMsg { text-align: center; margin-top: 15px; font-size: 0.85rem; font-weight: 600; }
        .success { color: #00ff88; }
        .error { color: #ff3333; }
    </style>
</head>
<body>

<nav>
    <a href="/" class="logo">STAR STREAM</a> <!-- Home එකට යන්න / දමා ඇත -->
    <div class="nav-links">
        <a href="/">HOME</a>
        <a href="/browse">BROWSE</a>
    </div>
</nav>

<div class="container">
    <div class="card">
        <h2>CONTENT SUBMISSION</h2>

        <div class="form-group">
            <label>Choose Actress</label>
            <select id="actressSelect" onchange="toggleNewActress()">
                <option value="">-- Select One --</option>
                <option value="NEW">+ Add New Actress</option>
            </select>
        </div>

        <div id="newActressForm" style="display: none; padding: 15px; background: #0a0a0a; border-radius: 12px; margin-bottom: 20px; border-left: 3px solid var(--accent);">
            <div class="form-group">
                <label>Actress Name</label>
                <input type="text" id="newName" placeholder="Enter Full Name">
            </div>
            <div class="form-group">
                <label>Profile Image</label>
                <div class="file-upload">
                    <span id="profileStatus">Select Profile Image</span>
                    <input type="file" id="profileInput" accept="image/*" onchange="updateFileName('profileInput', 'profileStatus')">
                </div>
            </div>
        </div>

        <div class="form-group">
            <label>Content Type</label>
            <select id="contentType">
                <option value="Video">Video</option>
                <option value="Photo">Photo</option>
            </select>
        </div>

        <div class="form-group">
            <label>Upload File (Video/Photo)</label>
            <div class="file-upload">
                <span id="contentStatus">Choose File to Upload</span>
                <input type="file" id="contentInput" accept="image/*,video/*" onchange="updateFileName('contentInput', 'contentStatus')">
            </div>
        </div>

        <button id="uploadBtn" class="btn" onclick="startUpload()">START UPLOAD</button>

        <div id="progressContainer">
            <div id="progressBar"></div>
        </div>
        <div id="statusMsg"></div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxfxImMahZ1XMk5Zi6K_USKcdUPLbAOsch17wKGMj94bQghk7o4Z5gtmjQ7zcR-03sH/exec";

    function toggleNewActress() {
        const select = document.getElementById('actressSelect');
        document.getElementById('newActressForm').style.display = (select.value === 'NEW') ? 'block' : 'none';
    }

    function updateFileName(inputId, statusId) {
        const file = document.getElementById(inputId).files[0];
        document.getElementById(statusId).innerText = file ? file.name : "Select File";
    }

    async function fileToBase64(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = () => resolve({ base64: reader.result.split(',')[1], type: file.type, name: file.name });
            reader.readAsDataURL(file);
        });
    }

    // නම් ටික Load කරගැනීමට අලුත් ක්‍රමය
    window.onload = async function() {
        try {
            const res = await fetch(SCRIPT_URL + "?action=getNames");
            const names = await res.json();
            const dropdown = document.getElementById('actressSelect');
            names.forEach(n => {
                let opt = document.createElement('option');
                opt.value = n; opt.innerText = n;
                dropdown.appendChild(opt);
            });
        } catch(e) { console.log("Name loading failed"); }
    };

    async function startUpload() {
        const btn = document.getElementById('uploadBtn');
        const contentInput = document.getElementById('contentInput').files[0];
        const msg = document.getElementById('statusMsg');
        const bar = document.getElementById('progressBar');
        const barCont = document.getElementById('progressContainer');

        let select = document.getElementById('actressSelect').value;
        let name = (select === 'NEW') ? document.getElementById('newName').value : select;

        if (!name || !contentInput) return alert("Please fill all details!");

        btn.disabled = true;
        msg.innerText = "Uploading... Please wait.";
        barCont.style.display = 'block';
        bar.style.width = '50%';

        const payload = { name, type: document.getElementById('contentType').value, fileName: contentInput.name, fileType: contentInput.type };
        const mediaData = await fileToBase64(contentInput);
        payload.fileBase64 = mediaData.base64;

        if (select === 'NEW') {
            const pFile = document.getElementById('profileInput').files[0];
            if (pFile) {
                const pData = await fileToBase64(pFile);
                payload.profileBase64 = pData.base64; payload.profileType = pData.type;
            }
        }

        try {
            const response = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
            const result = await response.text();
            
            if(result === "Success") {
                bar.style.width = '100%';
                msg.innerText = "SUBMITTED FOR REVIEW!";
                msg.className = "success";
            } else {
                throw new Error(result);
            }
        } catch (error) {
            msg.innerText = "Error: " + error.message;
            msg.className = "error";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
