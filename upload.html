<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Content | STAR STREAM</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ff0055; --bg: #050505; --surface: rgba(15, 15, 18, 0.65); --text: #ffffff; --border: rgba(255, 255, 255, 0.1); }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: var(--surface); padding: 30px; border-radius: 12px; border: 1px solid var(--border); }
        h2 { font-family: 'Syncopate', sans-serif; color: var(--accent); text-align: center; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; }
        select, input[type="text"], input[type="file"] { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid var(--border); background: rgba(0,0,0,0.5); color: #fff; }
        button { background: var(--accent); color: #fff; border: none; padding: 15px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:disabled { background: #555; cursor: not-allowed; }
        .hidden { display: none; }
        #status { text-align: center; margin-top: 15px; color: #aaa; }
    </style>
</head>
<body>

<div class="container" id="formView">
    <h2>UPLOAD MEDIA</h2>
    
    <div class="form-group">
        <label>Model Name</label>
        <select id="modelSelect" onchange="toggleNewModel()">
            <option value="">-- Select Model --</option>
            <option value="NEW">+ Add New Model</option>
        </select>
        <input type="text" id="newModelName" class="hidden" placeholder="Enter New Model Name" style="margin-top:10px;">
    </div>

    <div class="form-group" id="profileUploadDiv" class="hidden">
        <label>Profile Picture (For New Model)</label>
        <input type="file" id="profilePic" accept="image/*">
    </div>

    <div class="form-group">
        <label>Upload Type</label>
        <select id="uploadType" onchange="toggleInputType()">
            <option value="Photo">Photo</option>
            <option value="Video">Video File</option>
            <option value="TikTok">TikTok Link</option>
        </select>
    </div>

    <div class="form-group" id="fileInputDiv">
        <label>Select File</label>
        <input type="file" id="mediaFile" accept="image/*,video/*">
    </div>

    <div class="form-group hidden" id="linkInputDiv">
        <label>TikTok URL</label>
        <input type="text" id="tiktokUrl" placeholder="Paste TikTok Link here...">
    </div>

    <button id="uploadBtn" onclick="processUpload()">Upload to Server</button>
    <div id="status"></div>
</div>

<div class="container hidden" id="successView" style="text-align:center;">
    <h2 style="color:#00ff88;">UPLOAD SUCCESS!</h2>
    <p>Media has been successfully uploaded and sent for Admin Approval.</p>
    <button onclick="location.reload()">Upload Another</button>
</div>

<script>
    // ඔබේ අලුත් Web App URL එක මෙතනට දාන්න
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxtmBeY8ek41WhGAtA_iPjLMgXjR7L_WiHN_ONNz-3ZFBQM5iLlplcI1AlngIRRzTrA/exec";
    const BOT_TOKEN = "8974378669:AAE3fxJa-OdGUi9HXiKkPu9b7SC8QeUXp4Q";
    const CHANNEL_ID = "-1003754232314";

    // Load Existing Models
    fetch(SCRIPT_URL + "?action=getNames")
        .then(res => res.json())
        .then(data => {
            const sel = document.getElementById('modelSelect');
            data.forEach(name => sel.innerHTML += `<option value="${name}">${name}</option>`);
        });

    function toggleNewModel() {
        const sel = document.getElementById('modelSelect').value;
        document.getElementById('newModelName').style.display = sel === 'NEW' ? 'block' : 'none';
        document.getElementById('profileUploadDiv').style.display = sel === 'NEW' ? 'block' : 'none';
    }

    function toggleInputType() {
        const type = document.getElementById('uploadType').value;
        if(type === 'TikTok') {
            document.getElementById('fileInputDiv').style.display = 'none';
            document.getElementById('linkInputDiv').style.display = 'block';
        } else {
            document.getElementById('fileInputDiv').style.display = 'block';
            document.getElementById('linkInputDiv').style.display = 'none';
            document.getElementById('mediaFile').accept = type === 'Photo' ? 'image/*' : 'video/*';
        }
    }

    async function uploadToTelegram(fileOrUrl, isPhoto) {
        const endpoint = isPhoto ? 'sendPhoto' : 'sendVideo';
        const formData = new FormData();
        formData.append('chat_id', CHANNEL_ID);
        formData.append(isPhoto ? 'photo' : 'video', fileOrUrl);

        const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/${endpoint}`, { method: 'POST', body: formData });
        const data = await res.json();
        if (!data.ok) throw new Error(data.description);
        return isPhoto ? data.result.photo[data.result.photo.length - 1].file_id : data.result.video.file_id;
    }

    async function processUpload() {
        const btn = document.getElementById('uploadBtn');
        const status = document.getElementById('status');
        const modelSel = document.getElementById('modelSelect').value;
        const name = modelSel === 'NEW' ? document.getElementById('newModelName').value : modelSel;
        const upType = document.getElementById('uploadType').value;
        
        if (!name) return alert("Please select or enter a Model Name");

        btn.disabled = true;
        
        try {
            let profileId = "";
            let contentFileId = "";

            // 1. Upload Profile Picture if New Model
            if (modelSel === 'NEW') {
                const pFile = document.getElementById('profilePic').files[0];
                if (pFile) {
                    status.innerText = "Uploading Profile Picture...";
                    profileId = await uploadToTelegram(pFile, true);
                }
            }

            // 2. Upload Content
            if (upType === 'TikTok') {
                status.innerText = "Downloading TikTok Video...";
                const tikUrl = document.getElementById('tiktokUrl').value;
                const tikRes = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(tikUrl)}`);
                const tikData = await tikRes.json();
                
                if (tikData.code === 0) {
                    status.innerText = "Uploading TikTok to Server...";
                    contentFileId = await uploadToTelegram(tikData.data.play, false);
                } else {
                    throw new Error("Invalid TikTok Link or Download Failed");
                }
            } else {
                const mFile = document.getElementById('mediaFile').files[0];
                if (!mFile) throw new Error("Please select a file to upload");
                
                status.innerText = "Uploading Media File...";
                contentFileId = await uploadToTelegram(mFile, upType === 'Photo');
            }

            // 3. Send Data to Google Sheet
            status.innerText = "Saving to Database...";
            const payload = {
                name: name,
                type: upType === 'TikTok' ? 'Video' : upType, // Save TikTok as Video
                fileId: contentFileId,
                profileId: profileId
            };

            const sheetRes = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
            const resultText = await sheetRes.text();

            if (resultText === "Success") {
                document.getElementById('formView').style.display = 'none';
                document.getElementById('successView').style.display = 'block';
            } else {
                throw new Error(resultText);
            }

        } catch (error) {
            status.innerText = "Error: " + error.message;
            status.style.color = "red";
            console.error(error);
        } finally {
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
