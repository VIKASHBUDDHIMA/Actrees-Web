<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Content | STAR STREAM</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ff0055; --bg: #050505; --surface: #111113; --text: #ffffff; }
        * { box-sizing: border-box; transition: all 0.3s ease; }
        body { background: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; }
        nav { width: 100%; padding: 15px 5%; background: rgba(0,0,0,0.9); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .logo { font-family: 'Syncopate'; color: var(--accent); text-decoration: none; font-size: 1.2rem; }
        .container { max-width: 500px; margin: 40px auto; padding: 20px; }
        .card { background: var(--surface); padding: 30px; border-radius: 20px; border: 1px solid #222; }
        h2 { font-family: 'Syncopate'; font-size: 1rem; color: var(--accent); text-align: center; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.75rem; color: #888; margin-bottom: 8px; font-weight: 600; text-transform: uppercase; }
        select, input[type="text"] { width: 100%; padding: 14px; background: #1a1a1e; border: 1px solid #333; color: white; border-radius: 10px; outline: none; }
        .file-upload { border: 2px dashed #333; border-radius: 10px; padding: 20px; text-align: center; cursor: pointer; background: #1a1a1e; position: relative; }
        .file-upload span { font-size: 0.8rem; color: #aaa; }
        .file-upload input { position: absolute; width: 100%; height: 100%; top: 0; left: 0; opacity: 0; cursor: pointer; }
        #progressContainer { display: none; margin: 20px 0; background: #222; height: 8px; border-radius: 4px; overflow: hidden; }
        #progressBar { width: 0%; height: 100%; background: var(--accent); }
        .btn { width: 100%; padding: 15px; background: var(--accent); border: none; color: white; font-weight: 700; border-radius: 10px; cursor: pointer; margin-top: 10px; }
        .btn:disabled { background: #444; cursor: not-allowed; }
        #statusMsg { text-align: center; margin-top: 15px; font-size: 0.85rem; font-weight: 600; }
    </style>
</head>
<body>

<nav><a href="#" class="logo">STAR STREAM</a></nav>

<div class="container">
    <div class="card">
        <h2>CONTENT SUBMISSION</h2>

        <div class="form-group">
            <label>Choose Actress</label>
            <select id="actressSelect" onchange="toggleNewActress()">
                <option value="">-- Loading Actresses... --</option>
                <option value="NEW">+ Add New Actress</option>
            </select>
        </div>

        <div id="newActressForm" style="display: none; padding: 15px; background: #0a0a0a; border-radius: 10px; margin-bottom: 20px;">
            <div class="form-group">
                <label>Actress Name</label>
                <input type="text" id="newName" placeholder="Enter Name">
            </div>
            <div class="form-group">
                <label>Profile Image (Square)</label>
                <div class="file-upload">
                    <span id="profileStatus">Select Profile Image</span>
                    <input type="file" id="profileInput" accept="image/*" onchange="updateFileName(this, 'profileStatus')">
                </div>
            </div>
        </div>

        <div class="form-group">
            <label>Content Type</label>
            <select id="contentType">
                <option value="Photo">Photo</option>
                <option value="Video">Video</option>
            </select>
        </div>

        <div class="form-group">
            <label>Upload Media (Photo/Video)</label>
            <div class="file-upload">
                <span id="contentStatus">Choose File to Upload</span>
                <input type="file" id="contentInput" accept="image/*,video/*" onchange="updateFileName(this, 'contentStatus')">
            </div>
        </div>

        <button id="uploadBtn" class="btn" onclick="startUpload()">START UPLOAD</button>

        <div id="progressContainer"><div id="progressBar"></div></div>
        <div id="statusMsg"></div>
    </div>
</div>

<script>
    // 🔴 වැදගත්: ඔයාගේ අලුත්ම Web App URL එක මෙතැනට දාන්න
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwt0fmO3f0Ikkq8l1V-tSM85KrewR8zPgOvve8caVeg_Xo5-fp4pZsghJHAr2YOMFnV/exec"; 

    function toggleNewActress() {
        const select = document.getElementById('actressSelect');
        document.getElementById('newActressForm').style.display = (select.value === 'NEW') ? 'block' : 'none';
    }

    function updateFileName(input, statusId) {
        if (input.files && input.files[0]) {
            document.getElementById(statusId).innerText = input.files[0].name;
            document.getElementById(statusId).style.color = "#00ff88";
        }
    }

    async function fileToBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve({ base64: reader.result.split(',')[1], type: file.type, name: file.name });
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }

    window.onload = async () => {
        try {
            const res = await fetch(SCRIPT_URL + "?action=getNames");
            const names = await res.json();
            const dropdown = document.getElementById('actressSelect');
            dropdown.innerHTML = '<option value="">-- Select Actress --</option><option value="NEW">+ Add New Actress</option>';
            names.forEach(n => {
                let opt = document.createElement('option');
                opt.value = opt.innerText = n;
                dropdown.appendChild(opt);
            });
        } catch(e) {
            document.getElementById('actressSelect').innerHTML = '<option value="NEW">+ Add New Actress</option>';
        }
    };

    async function startUpload() {
        const btn = document.getElementById('uploadBtn');
        const contentFile = document.getElementById('contentInput').files[0];
        const actressSelect = document.getElementById('actressSelect').value;
        const newName = document.getElementById('newName').value.trim();
        const profileFile = document.getElementById('profileInput').files[0];
        
        const msg = document.getElementById('statusMsg');
        const bar = document.getElementById('progressBar');
        const barCont = document.getElementById('progressContainer');

        let finalName = "";
        if (actressSelect === 'NEW') {
            if (!newName) return alert("Please enter the Actress name!");
            if (!profileFile) return alert("Profile image is required for a new Actress!");
            finalName = newName;
        } else {
            if (!actressSelect) return alert("Please select an Actress!");
            finalName = actressSelect;
        }

        if (!contentFile) return alert("Please select a file to upload!");

        btn.disabled = true;
        msg.innerText = "Processing...";
        msg.style.color = "white";
        barCont.style.display = 'block';
        bar.style.width = '20%';

        try {
            const payload = { 
                name: finalName, 
                type: document.getElementById('contentType').value, 
                fileName: contentFile.name, 
                fileType: contentFile.type 
            };

            const mediaData = await fileToBase64(contentFile);
            payload.fileBase64 = mediaData.base64;
            bar.style.width = '50%';
            msg.innerText = "Uploading to Drive...";

            if (actressSelect === 'NEW') {
                const pData = await fileToBase64(profileFile);
                payload.profileBase64 = pData.base64;
                payload.profileType = pData.type;
            }

            bar.style.width = '80%';

            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            });

            const result = await response.text();
            
            if(result.includes("Success")) {
                bar.style.width = '100%';
                msg.innerText = "SUCCESSFULLY UPLOADED!";
                msg.style.color = "#00ff88";
                setTimeout(() => { window.location.reload(); }, 2500); // Reloads the page after success
            } else {
                throw new Error(result);
            }
        } catch (error) {
            msg.innerText = "FAILED: " + error.message;
            msg.style.color = "#ff3333";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
