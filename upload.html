<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUBMIT CONTENT | STAR STREAM</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Montserrat:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ff0055; --bg: #030303; --surface: #0a0a0c; }
        body { background: var(--bg); color: white; font-family: 'Montserrat', sans-serif; margin: 0; }
        
        /* Navigation (Same as Main Site) */
        nav { position: fixed; width: 100%; padding: 20px 6%; display: flex; justify-content: space-between; align-items: center; z-index: 1000; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); }
        .logo { font-family: 'Syncopate', sans-serif; font-size: 1.4rem; color: #fff; text-decoration: none; }
        .logo span { color: var(--accent); }

        .container { padding-top: 120px; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding-bottom: 50px; }
        .upload-card { background: var(--surface); padding: 30px; border-radius: 20px; width: 90%; max-width: 500px; border: 1px solid rgba(255,0,85,0.3); }
        h2 { font-family: 'Syncopate'; font-size: 1.2rem; color: var(--accent); text-align: center; margin-bottom: 30px; }

        label { display: block; font-size: 0.7rem; letter-spacing: 2px; margin: 15px 0 5px; color: #888; }
        input, select { width: 100%; padding: 12px; background: #1a1a1c; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; }
        
        .btn { width: 100%; padding: 15px; background: var(--accent); border: none; color: white; font-weight: 900; margin-top: 25px; border-radius: 50px; cursor: pointer; transition: 0.3s; }
        .btn:disabled { background: #444; }
        #status { text-align: center; font-size: 0.8rem; margin-top: 15px; color: var(--accent); }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">STAR<span>STREAM</span></a>
    </nav>

    <div class="container">
        <div class="upload-card">
            <h2>CONTRIBUTE <span>MEDIA</span></h2>
            
            <label>CHOOSE ACTRESS</label>
            <select id="nameDropdown" onchange="toggleNewName()">
                <option value="">-- Select Existing --</option>
                <option value="NEW">Add New Actress +</option>
            </select>

            <div id="newNameGroup" style="display:none;">
                <label>NEW ACTRESS NAME</label>
                <input type="text" id="newName" placeholder="Enter full name">
                <label>PROFILE PHOTO URL</label>
                <input type="text" id="profile" placeholder="https://...">
            </div>

            <label>CONTENT TYPE</label>
            <select id="type">
                <option value="video">Video Clip</option>
                <option value="photo">Photo Gallery</option>
            </select>

            <label>SELECT FILE</label>
            <input type="file" id="fileInput" accept="image/*,video/*">

            <button class="btn" onclick="startUpload()" id="upBtn">SUBMIT FOR REVIEW</button>
            <div id="status"></div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "YOUR_APPS_SCRIPT_WEB_APP_URL";

        // ගූගල් ෂීට් එකේ ඇති නම් ලබා ගැනීම
        window.onload = () => {
            fetch(SCRIPT_URL + "?action=getNames") // සටහන: මෙය සරල කර ඇත
            google.script.run.withSuccessHandler(populateNames).getExistingNames();
        };

        function populateNames(names) {
            const select = document.getElementById('nameDropdown');
            names.forEach(n => {
                let opt = document.createElement('option');
                opt.value = n; opt.innerText = n;
                select.appendChild(opt);
            });
        }

        function toggleNewName() {
            const val = document.getElementById('nameDropdown').value;
            document.getElementById('newNameGroup').style.display = (val === 'NEW') ? 'block' : 'none';
        }

        function startUpload() {
            const btn = document.getElementById('upBtn');
            const file = document.getElementById('fileInput').files[0];
            const name = document.getElementById('nameDropdown').value === 'NEW' ? document.getElementById('newName').value : document.getElementById('nameDropdown').value;
            
            if(!name || !file) return alert("Please fill all fields!");

            btn.disabled = true; btn.innerText = "PROCESSING...";

            const reader = new FileReader();
            reader.onload = function(e) {
                const data = {
                    fileBase64: e.target.result.split(',')[1],
                    fileType: file.type,
                    fileName: file.name,
                    name: name,
                    profile: document.getElementById('profile').value || "",
                    type: document.getElementById('type').value
                };

                google.script.run.withSuccessHandler(res => {
                    document.getElementById('status').innerText = res;
                    btn.disabled = false; btn.innerText = "SUBMIT FOR REVIEW";
                }).uploadFile(data);
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
