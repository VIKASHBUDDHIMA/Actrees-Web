<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Content</title>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: #111; padding: 20px; border-radius: 10px; border: 1px solid #333; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; background: #222; color: #fff; border: 1px solid #444; border-radius: 5px; }
        button { background: #ff0055; cursor: pointer; border: none; font-weight: bold; }
        #status { text-align: center; margin-top: 10px; color: #ff0055; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Upload Media</h2>
        <input type="text" id="name" placeholder="Name">
        <select id="type"><option value="VIDEO">Video</option><option value="PHOTO">Photo</option></select>
        <input type="file" id="mediaFile">
        <input type="url" id="link" placeholder="Paste Video Link (TikTok/Insta/YT)">
        <button onclick="upload()">SUBMIT</button>
        <p id="status"></p>
    </div>

    <script>
        // ඔයා ඉල්ලපු ලින්ක් එක මෙතන තියෙනවා
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxuzFQMSEkX7l1esduvRYBD_XslQDVQZ349RUhE8YSQQywUCXtwDCsTqSwtDOCXutht/exec';
        
        async function upload() {
            const status = document.getElementById('status');
            status.innerText = "Processing...";
            const name = document.getElementById('name').value;
            const type = document.getElementById('type').value;
            const fileInput = document.getElementById('mediaFile');
            const link = document.getElementById('link').value;
            
            if(!name) return status.innerText = "Please enter a name!";

            let payload = { name, type };

            if (link) {
                payload.action = "uploadLink";
                payload.url = link;
            } else if (fileInput.files[0]) {
                const file = fileInput.files[0];
                const reader = new FileReader();
                reader.readAsDataURL(file);
                await new Promise(r => reader.onload = r);
                payload.action = "uploadFile";
                payload.fileName = file.name;
                payload.fileType = file.type;
                payload.fileBase64 = reader.result.split(',')[1];
            } else {
                return status.innerText = "Please select a file or paste a link!";
            }

            try {
                const response = await fetch(SCRIPT_URL, { 
                    method: 'POST', 
                    body: JSON.stringify(payload) 
                });
                const result = await response.text();
                status.innerText = result;
            } catch(e) {
                status.innerText = "Error: " + e.message;
            }
        }
    </script>
</body>
</html>
