<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Video Player</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f2f5; font-family: sans-serif; }
        .container { text-align: center; }
        video { border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); background: #000; }
    </style>
</head>
<body>

<div class="container">
    <h2>Video Player</h2>
    <video id="telegramVideo" width="640" height="360" controls>
        ඔබේ බ්‍රවුසරය වීඩියෝව ප්ලේ කිරීමට සහය නොදක්වයි.
    </video>
    <p id="status">වීඩියෝව Load වෙමින් පවතී...</p>
</div>

<script>
    // ඔබේ තොරතුරු මෙතැනට ඇතුලත් කරන්න
    const BOT_TOKEN = "8974378669:AAE3fxJa-OdGUi9HXiKkPu9b7SC8QeUXp4Q"; 
    const FILE_ID = "BAACAgUAAyEGAATfxQn6AAMJajJnxSHe2wABEhMxjXr03q4-SFhIAAIQIAACygaQVRjV1L38gcqKPAQ";

    async function loadVideo() {
        const status = document.getElementById("status");
        const video = document.getElementById("telegramVideo");

        try {
            // මෙන්න මෙතන තමයි වැදගත්ම තැන: අනිවාර්යයෙන්ම Backticks (`) භාවිතා කරන්න
            const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getFile?file_id=${FILE_ID}`);
            const data = await response.json();

            if (data.ok) {
                const filePath = data.result.file_path;
                const videoUrl = `https://api.telegram.org/file/bot${BOT_TOKEN}/${filePath}`;
                
                video.src = videoUrl;
                status.innerText = "වීඩියෝව සාර්ථකව ප්ලේ වේ!";
            } else {
                status.innerText = "දෝෂයක් සිදුවිය: " + data.description;
            }
        } catch (error) {
            status.innerText = "Error: සම්බන්ධ වීමට නොහැක.";
            console.error(error);
        }
    }

    loadVideo();
</script>

</body>
</html>
