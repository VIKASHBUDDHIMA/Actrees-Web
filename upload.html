<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Content | STAR STREAM</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    
    <style>
        :root { 
            --accent: #ff0055; 
            --accent-glow: rgba(255, 0, 85, 0.4);
            --bg: #050505; 
            --surface: rgba(15, 15, 18, 0.65); 
            --text: #ffffff; 
            --text-muted: #888890;
            --border: rgba(255, 255, 255, 0.06);
        }
        
        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); margin: 0; padding: 0; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 550px; background: var(--surface); padding: 40px; border-radius: 16px; border: 1px solid var(--border); backdrop-filter: blur(10px); }
        h2 { font-family: 'Syncopate', sans-serif; text-align: center; margin-bottom: 30px; letter-spacing: 1px; }
        h2 span { color: var(--accent); text-shadow: 0 0 15px var(--accent-glow); }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--text-muted); font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        select, input[type="text"], input[type="file"] { width: 100%; padding: 14px; border-radius: 8px; border: 1px solid var(--border); background: rgba(0,0,0,0.5); color: #fff; font-family: 'Montserrat', sans-serif; outline: none; }
        select:focus, input[type="text"]:focus { border-color: var(--accent); }
        
        button { background: linear-gradient(45deg, #ff0055, #ff4081); color: #fff; border: none; padding: 16px; width: 100%; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 15px; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 5px 20px var(--accent-glow); margin-top: 10px; }
        button:disabled { background: #333; color: #777; cursor: not-allowed; box-shadow: none; }
        
        .progress-container { margin-top: 20px; display: none; }
        .progress-bar-bg { width: 100%; background: rgba(255,255,255,0.1); border-radius: 10px; height: 8px; overflow: hidden; margin-bottom: 10px; }
        .progress-bar { height: 100%; background: var(--accent); width: 0%; box-shadow: 0 0 10px var(--accent-glow); transition: width 0.3s; }
        .status-text { text-align: center; color: var(--text-muted); font-size: 13px; font-weight: 500; }
        
        .hidden { display: none !important; }
        #successView { text-align: center; }
        .success-icon { font-size: 60px; color: #00ff88; text-shadow: 0 0 20px rgba(0,255,136,0.4); margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container" id="formView">
    <h2>UPLOAD <span>MEDIA</span></h2>
    
    <div class="form-group">
        <label><i class="ri-user-star-line"></i> Model Name</label>
        <select id="modelSelect" onchange="toggleNewModel()">
            <option value="">-- Select Model --</option>
            <option value="NEW">+ Add New Model</option>
        </select>
        <input type="text" id="newModelName" class="hidden" placeholder="Enter New Model Name" style="margin-top:10px;">
    </div>

    <div class="form-group hidden" id="profileUploadDiv">
        <label><i class="ri-image-add-line"></i> Profile Picture (For New Model)</label>
        <input type="file" id="profilePic" accept="image/*">
    </div>

    <div class="form-group">
        <label><i class="ri-folder-video-line"></i> Upload Type</label>
        <select id="uploadType" onchange="toggleInputType()">
            <option value="Photo">Photo</option>
            <option value="Video">Video File</option>
            <option value="TikTok">TikTok Link</option>
        </select>
    </div>

    <div class="form-group" id="fileInputDiv">
        <label><i class="ri-upload-cloud-2-line"></i> Select File</label>
        <input type="file" id="mediaFile" accept="image/*,video/*">
    </div>

    <div class="form-group hidden" id="linkInputDiv">
        <label><i class="ri-links-line"></i> TikTok URL</label>
        <input type="text" id="tiktokUrl" placeholder="Paste TikTok Link here...">
    </div>

    <button id="uploadBtn" onclick="processUpload()">Upload Content</button>

    <div class="progress-container" id="progressContainer">
        <div class="progress-bar-bg"><div class="progress-bar" id="progressBar"></div></div>
        <div class="status-text" id="statusText">Processing...</div>
    </div>
</div>

<div class="container hidden" id="successView">
    <i class="ri-checkbox-circle-fill success-icon"></i>
    <h2 style="color: #00ff88; margin-bottom:10px;">SUCCESS!</h2>
    <p style="color: var(--text-muted); margin-bottom: 20px;">Media has been uploaded and sent for Admin Approval.</p>
    <button onclick="location.reload()">Upload Another</button>
</div>

<script>
    // අලුත් Web App URL එක දාන්න
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxtmBeY8ek41WhGAtA_iPjLMgXjR7L_WiHN_ONNz-3ZFBQM5iLlplcI1AlngIRRzTrA/exec";
    const BOT_TOKEN = "8974378669:AAE3fxJa-OdGUi9HXiKkPu9b7SC8QeUXp4Q";
    const CHANNEL_ID = "-1003754232314";

    fetch(SCRIPT_URL + "?action=getNames")
        .then(res => res.json())
        .then(data => {
            const sel = document.getElementById('modelSelect');
            data.forEach(name => sel.innerHTML += `<option value="${name}">${name}</option>`);
        });

    function toggleNewModel() {
        const sel = document.getElementById('modelSelect').value;
        document.getElementById('newModelName').classList.toggle('hidden', sel !== 'NEW');
        document.getElementById('profileUploadDiv').classList.toggle('hidden', sel !== 'NEW');
    }

    function toggleInputType() {
        const type = document.getElementById('uploadType').value;
        if(type === 'TikTok') {
            document.getElementById('fileInputDiv').classList.add('hidden');
            document.getElementById('linkInputDiv').classList.remove('hidden');
        } else {
            document.getElementById('fileInputDiv').classList.remove('hidden');
            document.getElementById('linkInputDiv').classList.add('hidden');
            document.getElementById('mediaFile').accept = type === 'Photo' ? 'image/*' : 'video/*';
        }
    }

    async function uploadToTelegram(fileOrUrl, isPhoto) {
        const endpoint = isPhoto ? 'sendPhoto' : 'sendVideo';
        const formData = new FormData();
        formData.append('chat_id', CHANNEL_ID);
        formData.append(isPhoto ? 'photo' : 'video', fileOrUrl);

        const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/${endpoint}`, { method: 'POST', body: formData });
        const data = await res.json();
        if (!data.ok) throw new Error(data.description);
        return isPhoto ? data.result.photo[data.result.photo.length - 1].file_id : data.result.video.file_id;
    }

    async function processUpload() {
        const btn = document.getElementById('uploadBtn');
        const progCont = document.getElementById('progressContainer');
        const progBar = document.getElementById('progressBar');
        const status = document.getElementById('statusText');
        
        const modelSel = document.getElementById('modelSelect').value;
        const name = modelSel === 'NEW' ? document.getElementById('newModelName').value : modelSel;
        const upType = document.getElementById('uploadType').value;
        
        if (!name) return alert("Please select or enter a Model Name!");

        btn.style.display = 'none';
        progCont.style.display = 'block';
        progBar.style.width = '10%';
        
        try {
            let profileId = "";
            let contentFileId = "";

            if (modelSel === 'NEW') {
                const pFile = document.getElementById('profilePic').files[0];
                if (pFile) {
                    status.innerText = "Uploading Profile Picture...";
                    profileId = await uploadToTelegram(pFile, true);
                    progBar.style.width = '30%';
                }
            }

            if (upType === 'TikTok') {
                status.innerText = "Fetching TikTok Video...";
                const tikUrl = document.getElementById('tiktokUrl').value;
                const tikRes = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(tikUrl)}`);
                const tikData = await tikRes.json();
                
                if (tikData.code === 0) {
                    status.innerText = "Uploading TikTok to Telegram...";
                    progBar.style.width = '60%';
                    contentFileId = await uploadToTelegram(tikData.data.play, false);
                } else {
                    throw new Error("Invalid TikTok Link");
                }
            } else {
                const mFile = document.getElementById('mediaFile').files[0];
                if (!mFile) throw new Error("Please select a file to upload");
                
                status.innerText = "Uploading Media File to Telegram...";
                progBar.style.width = '60%';
                contentFileId = await uploadToTelegram(mFile, upType === 'Photo');
            }

            progBar.style.width = '90%';
            status.innerText = "Saving to Database...";

            const payload = {
                name: name,
                type: upType === 'TikTok' ? 'Video' : upType,
                fileId: contentFileId,
                profileId: profileId
            };

            const sheetRes = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
            const resultText = await sheetRes.text();

            if (resultText === "Success") {
                progBar.style.width = '100%';
                setTimeout(() => {
                    document.getElementById('formView').classList.add('hidden');
                    document.getElementById('successView').classList.remove('hidden');
                }, 500);
            } else {
                throw new Error("Database Error: " + resultText);
            }

        } catch (error) {
            status.innerText = "Error: " + error.message;
            status.style.color = "#ff0055";
            btn.style.display = 'block';
            console.error(error);
        }
    }
</script>
</body>
</html>
