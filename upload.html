<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Content | STAR STREAM</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent: #ff0055; 
            --gold: #d4af37; 
            --bg: #030303; 
            --text: #ffffff; 
        }
        
        * { box-sizing: border-box; transition: all 0.3s ease; margin: 0; padding: 0; }
        
        body { 
            background-color: var(--bg);
            /* මෙතනට ඔයාගේ Main Website එකේ Background Image එකේ නම හෝ Link එක දෙන්න */
            background-image: url('https://drive.google.com/uc?export=view&id=1QPXZ67AA7PcS3t_TMo3q3hkjWZEQCvY0'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text); 
            font-family: 'Montserrat', sans-serif; 
        }

        /* Dark overlay over the background image */
        .background-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(3, 3, 3, 0.75);
            z-index: -1;
        }
        
        nav { 
            width: 100%; padding: 20px 8%; 
            background: rgba(0, 0, 0, 0.6); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid rgba(255, 0, 85, 0.2); 
            position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-family: 'Syncopate'; color: var(--accent); text-decoration: none; font-size: 1.5rem; letter-spacing: 2px;}
        .nav-links { display: flex; gap: 30px; }
        .nav-links a { color: var(--text); text-decoration: none; font-size: 0.9rem; font-weight: 600; letter-spacing: 1px; }
        .nav-links a:hover { color: var(--accent); text-shadow: 0 0 10px rgba(255,0,85,0.5); }

        .container { 
            max-width: 650px; 
            margin: 60px auto; 
            padding: 40px; 
            background: rgba(10, 10, 12, 0.65); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 16px; 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            border-top: 1px solid rgba(255, 0, 85, 0.4);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5), 0 0 20px rgba(255,0,85,0.1);
        }
        
        h2 { 
            color: var(--text); 
            text-align: center; 
            margin-bottom: 35px; 
            font-family: 'Syncopate'; 
            letter-spacing: 2px;
            font-size: 1.8rem;
        }
        h2 span { color: var(--accent); }

        .form-group { margin-bottom: 25px; }
        label { display: block; margin-bottom: 10px; font-size: 0.85rem; font-weight: 600; color: #aaa; letter-spacing: 1px; }
        
        select, input[type="text"], input[type="file"] { 
            width: 100%; 
            padding: 14px 18px; 
            background: rgba(0, 0, 0, 0.5); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            color: white; 
            border-radius: 8px; 
            outline: none; 
            font-family: 'Montserrat', sans-serif;
            font-size: 0.95rem;
        }
        select:focus, input[type="text"]:focus { 
            border-color: var(--accent); 
            box-shadow: 0 0 10px rgba(255,0,85,0.2);
            background: rgba(0, 0, 0, 0.8);
        }

        input[type="file"]::file-selector-button {
            background: #222;
            color: white;
            border: 1px solid #444;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 15px;
            font-family: 'Montserrat', sans-serif;
            transition: all 0.3s;
        }
        input[type="file"]::file-selector-button:hover {
            background: var(--accent);
            border-color: var(--accent);
        }

        #newActressFields { 
            display: none; 
            margin-top: 15px; 
            padding: 20px; 
            background: rgba(255, 255, 255, 0.03); 
            border-radius: 8px; 
            border-left: 3px solid var(--accent); 
        }
        
        .btn { 
            width: 100%; 
            padding: 16px; 
            background: var(--accent); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-weight: 600; 
            cursor: pointer; 
            font-size: 1rem; 
            margin-top: 20px; 
            font-family: 'Montserrat', sans-serif;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .btn:hover { 
            background: #e6004c; 
            box-shadow: 0 0 20px rgba(255,0,85,0.4);
            transform: translateY(-2px);
        }
        .btn:disabled { background: #444; cursor: not-allowed; box-shadow: none; transform: none; }

        .progress-container { display: none; margin-top: 25px; }
        .progress-bar-bg { 
            width: 100%; 
            background: rgba(255,255,255,0.1); 
            border-radius: 10px; 
            height: 8px; 
            overflow: hidden; 
            margin-top: 15px; 
        }
        .progress-bar { 
            width: 0%; 
            height: 100%; 
            background: var(--accent); 
            box-shadow: 0 0 10px var(--accent);
            transition: width 0.4s ease; 
        }
        .status-text { text-align: center; font-size: 0.9rem; color: #ccc; margin-top: 10px; font-weight: 600; }

        #successView { display: none; text-align: center; padding: 20px 0; }
        #successView i { font-size: 4rem; color: #00ff88; margin-bottom: 15px; display: block; }
        #successView h3 { color: #00ff88; margin-bottom: 15px; font-family: 'Syncopate'; font-size: 1.5rem; }
        #successView p { color: #aaa; margin-bottom: 25px; line-height: 1.5; }
    </style>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>
    <div class="background-overlay"></div>
    
    <nav>
        <a href="#" class="logo">STAR STREAM</a>
        <div class="nav-links">
            <a href="index.html">GO TO GALLERY</a>
        </div>
    </nav>

    <div class="container">
        <div id="formView">
            <h2>UPLOAD <span>CONTENT</span></h2>

            <div class="form-group">
                <label>UPLOAD METHOD</label>
                <select id="uploadMethod" onchange="toggleMethod()">
                    <option value="file">FILE UPLOAD (FROM DEVICE)</option>
                    <option value="tiktok">TIKTOK LINK (AUTO DOWNLOAD)</option>
                </select>
            </div>

            <div class="form-group">
                <label>CONTENT TYPE</label>
                <select id="contentType">
                    <option value="PHOTO">PHOTO</option>
                    <option value="VIDEO">VIDEO</option>
                </select>
            </div>

            <div class="form-group">
                <label>SELECT MODEL / ACTRESS</label>
                <select id="actressSelect" onchange="toggleNewFields()">
                    <option value="">Loading Models...</option>
                    <option value="NEW">+ ADD NEW MODEL</option>
                </select>
            </div>

            <div id="newActressFields">
                <div class="form-group">
                    <label>NEW MODEL NAME</label>
                    <input type="text" id="newName" placeholder="Enter model name">
                </div>
                <div class="form-group">
                    <label>PROFILE PICTURE</label>
                    <input type="file" id="profilePic" accept="image/*">
                </div>
            </div>

            <div id="fileUploadSection" class="form-group">
                <label>SELECT MEDIA FILES</label>
                <input type="file" id="contentFiles" multiple accept="image/*,video/*">
            </div>

            <div id="tiktokUploadSection" class="form-group" style="display: none;">
                <label>TIKTOK VIDEO URL</label>
                <input type="text" id="tiktokLink" placeholder="https://www.tiktok.com/@user/video/123456789">
            </div>

            <button class="btn" id="uploadBtn" onclick="upload()">UPLOAD TO SERVER</button>

            <div class="progress-container" id="progressContainer">
                <div class="status-text" id="statusText">Initializing secure connection...</div>
                <div class="progress-bar-bg">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
            </div>
        </div>

        <div id="successView">
            <i class="ri-checkbox-circle-fill"></i>
            <h3>UPLOAD SUCCESSFUL!</h3>
            <p>Your content has been securely sent to the server and is currently waiting for admin approval.</p>
            <button class="btn" onclick="location.reload()">UPLOAD MORE CONTENT</button>
        </div>
    </div>

    <script>
        // MUST UPDATE: Add your deployed Apps Script URL here
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx6BMo92BLHsaViQjqIVXsz1RThusWr6iRd4BmZuogq1gca1AmbE3Bjwzp7SwvYuu7h/exec';

        window.onload = async () => {
            try {
                const res = await fetch(SCRIPT_URL + "?action=getNames");
                const names = await res.json();
                const select = document.getElementById('actressSelect');
                select.innerHTML = '<option value="" disabled selected>Select Model</option>';
                names.forEach(n => {
                    select.innerHTML += `<option value="${n}">${n}</option>`;
                });
                select.innerHTML += '<option value="NEW">+ ADD NEW MODEL</option>';
            } catch (e) {
                console.log("Error loading names. Make sure SCRIPT_URL is correct.");
            }
        };

        function toggleMethod() {
            const method = document.getElementById('uploadMethod').value;
            if (method === 'file') {
                document.getElementById('fileUploadSection').style.display = 'block';
                document.getElementById('tiktokUploadSection').style.display = 'none';
                document.getElementById('contentType').disabled = false;
            } else {
                document.getElementById('fileUploadSection').style.display = 'none';
                document.getElementById('tiktokUploadSection').style.display = 'block';
                document.getElementById('contentType').value = 'VIDEO';
                document.getElementById('contentType').disabled = true;
            }
        }

        function toggleNewFields() {
            const val = document.getElementById('actressSelect').value;
            document.getElementById('newActressFields').style.display = (val === 'NEW') ? 'block' : 'none';
        }

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve({
                    base64: reader.result.split(',')[1],
                    type: file.type
                });
                reader.onerror = error => reject(error);
            });
        }

        async function upload() {
            const method = document.getElementById('uploadMethod').value;
            const contentType = document.getElementById('contentType').value;
            const actressSelect = document.getElementById('actressSelect').value;
            const newName = document.getElementById('newName').value;
            const profilePic = document.getElementById('profilePic').files[0];

            if (!actressSelect) return alert("Please select a model.");
            if (actressSelect === 'NEW' && !newName) return alert("Please enter the new model's name.");
            if (actressSelect === 'NEW' && !profilePic) return alert("Please select a profile picture for the new model.");

            let files = [];
            let tkLink = "";

            if (method === 'file') {
                files = document.getElementById('contentFiles').files;
                if (files.length === 0) return alert("Please select files to upload.");
            } else {
                tkLink = document.getElementById('tiktokLink').value;
                if (!tkLink) return alert("Please paste a TikTok link.");
            }

            const btn = document.getElementById('uploadBtn');
            const progContainer = document.getElementById('progressContainer');
            const statusText = document.getElementById('statusText');
            const bar = document.getElementById('progressBar');

            btn.style.display = 'none';
            progContainer.style.display = 'block';

            try {
                let profileData = null;
                if (actressSelect === 'NEW') {
                    statusText.innerText = "Processing Profile Picture...";
                    profileData = await fileToBase64(profilePic);
                }

                if (method === 'tiktok') {
                    statusText.innerText = "Fetching TikTok Data...";
                    bar.style.width = '20%';

                    const apiUrl = `https://www.tikwm.com/api/?url=${encodeURIComponent(tkLink)}&hd=1`;
                    const tkResp = await fetch(apiUrl);
                    const tkData = await tkResp.json();

                    if (tkData.code !== 0 || !tkData.data || !tkData.data.play) {
                        throw new Error("Invalid TikTok link or API error");
                    }

                    statusText.innerText = "Downloading TikTok to Server...";
                    bar.style.width = '40%';

                    const videoResp = await fetch(tkData.data.play);
                    const videoBlob = await videoResp.blob();

                    statusText.innerText = "Processing Video Data...";
                    bar.style.width = '60%';

                    const base64Data = await new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onloadend = () => resolve(reader.result.split(',')[1]);
                        reader.onerror = reject;
                        reader.readAsDataURL(videoBlob);
                    });

                    statusText.innerText = "Uploading to Drive... (1/1)";
                    bar.style.width = '80%';

                    const payload = {
                        name: (actressSelect === 'NEW') ? newName : actressSelect,
                        type: 'VIDEO',
                        fileName: `TikTok_${Date.now()}.mp4`,
                        fileType: videoBlob.type || 'video/mp4',
                        fileBase64: base64Data
                    };

                    if (profileData) {
                        payload.profileBase64 = profileData.base64;
                        payload.profileType = profileData.type;
                    }

                    const response = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
                    const result = await response.text();
                    if (!result.includes("Success")) throw new Error(result);

                } else {
                    for (let i = 0; i < files.length; i++) {
                        statusText.innerText = `Uploading File ${i + 1} of ${files.length}...`;
                        bar.style.width = `${((i) / files.length) * 100}%`;

                        const currentFile = files[i];
                        const mediaData = await fileToBase64(currentFile);

                        const payload = {
                            name: (actressSelect === 'NEW') ? newName : actressSelect,
                            type: contentType,
                            fileName: currentFile.name,
                            fileType: currentFile.type,
                            fileBase64: mediaData.base64
                        };

                        if (i === 0 && profileData) {
                            payload.profileBase64 = profileData.base64;
                            payload.profileType = profileData.type;
                        }

                        const response = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
                        const result = await response.text();
                        if (!result.includes("Success")) throw new Error("Failed to upload file " + (i + 1) + ": " + result);

                        bar.style.width = `${((i + 1) / files.length) * 100}%`;
                    }
                }

                bar.style.width = '100%';
                document.getElementById('formView').style.display = 'none';
                document.getElementById('successView').style.display = 'block';

            } catch (error) {
                console.error("Upload Error:", error);
                alert("Error: " + error.message);
                btn.style.display = 'block';
                progContainer.style.display = 'none';
            }
        }
    </script>
</body>
</html>
